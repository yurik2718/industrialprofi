#     args: [ 1000, { batch_size: 500 } ]
#     schedule: every hour
#   periodic_cleanup_with_command:
#     command: "SoftDeletedRecord.due.delete_all"
#     priority: 2
#     schedule: at 5am every day

production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12

  # The one retention email: a quiet "continue where you left off" nudge for
  # stalled learners (one per stall — see User#needs_learning_reminder?).
  # 07:00 UTC = 10:00 МСК, a humane morning hour for the audience.
  learning_reminders:
    class: LearningReminderJob
    schedule: every day at 7am

  # Alerts administrators when the storage disk exceeds 80% — catches a
  # filling disk before SQLite breaks. Throttled to one email per day.
  disk_alert:
    class: DiskAlertJob
    schedule: every day at 9am

  # Sweeps orphaned lesson-image uploads (a blob picked then abandoned before
  # save) so the disk never accretes them. Attached images are untouched.
  purge_unattached_uploads:
    class: PurgeUnattachedBlobsJob
    schedule: every day at 4am
