  about:
    page_title: "О проекте — IndustrialProfi"
    eyebrow: "Письмо создателя"
    title: "Почему я создал IndustrialProfi"
    greeting: "Привет."
    p1: "Меня зовут Андрей. Этот проект я делаю один — после основной работы, по вечерам и выходным. И мне важно, чтобы ты с самого начала понимал, зачем он существует."
    p2: "Когда я смотрел, как учатся программисты, я по-доброму завидовал. У них есть сотни качественных и бесплатных материалов: бери и расти от нуля до профессионала, не платя ни рубля. А у рабочих профессий — у электриков, сварщиков, сантехников, наладчиков — ничего подобного просто не было."
    p3: "Знания о ремесле разбросаны по форумам, платным курсам сомнительного качества, устаревшим сайтам и пересказам, в которых легко наткнуться на ошибки. Человек, который хочет освоить профессию или подтвердить разряд, остаётся один на один с горой ГОСТов — и без карты, по которой оптимальнее всего идти."
    p4: "Особенно тяжело тем, кому и так непросто: молодым ребятам без денег на курсы, трудовым мигрантам, людям, которые меняют профессию уже взрослыми. Им нужны не красивые обещания, а переносимые, проверяемые знания — те, что реально применить на смене завтра и которые признают на аттестации."
    p5: "Поэтому IndustrialProfi устроен иначе. Мы не переписываем учебники и не пытаемся заменить собой стандарты. Мы — как библиотекарь, а не как учитель: объясняем картину простым языком, показываем, как всё устроено и зачем, а за точным словом всегда отправляем к первоисточнику — к официальному ГОСТу, ПУЭ, ПТЭЭП. Учим читать документы и практиковаться каждый день, потому что только так рождается настоящий всегда дефицинтный и востребованный СПЕЦИАЛИСТ."
    p6: "И есть то, без чего нельзя. В наших профессиях плохой совет не просто раздражает — он калечит. Цена ошибки - иногда это невероятно дорогое оборудование или даже жизнь. Поэтому безопасность здесь всегда на первом месте, а не в примечании мелким шрифтом."
    p7: "Моя цель проста и упряма: собрать лучшую бесплатную школу рабочих профессий для всего СНГ пространства. Бесплатную не на время акции, а навсегда. Я верю, что доступ к качественному обучению ремеслу не должен зависеть от толщины кошелька — официальные стандарты публичны, наша задача лишь выстроить их в понятный путь и добавить практику."
    p8: "Пока я тяну всё сам: код, тексты, дизайн, ответы в Telegram, разбор ошибок у конкретных людей. Я не идеален и наверняка где-то ошибаюсь. Поэтому мне очень нужен ты — тот, кто читает эти строки. Нашёл неточность — предложи правку. Ты мастер с опытом — поделись им. Просто хочешь, чтобы проект жил, — расскажи о нём коллеге или поддержи."
    p9: "Это не просто сайт. Это попытка сказать каждому, кто работает руками: твой труд достоин уважения, а твоё развитие — честной, качественной и открытой школы. Спасибо, что ты здесь. Давай строить её вместе."
    signature_name: "Андрей Юрик"
    signature_role: "Основатель IndustrialProfi"
    contact_html: 'Хочешь написать мне лично — я в <a href="%{telegram_url}" target="_blank" rel="noopener">Telegram</a>. Отвечаю каждому.'
    cta_explore: "Смотреть профессии"
    cta_support: "Поддержать проект"

  roadmap:
    page_title: "Дорожная карта — IndustrialProfi"
    eyebrow: "Дорожная карта"
    title: "Куда движется IndustrialProfi"
    intro: "IndustrialProfi — открытый проект, и его развитие должно быть таким же открытым. Здесь честно: что уже работает, что я делаю прямо сейчас, что запланировано и о чём пока только думаю."
    note: "Это живой документ. Я не называю жёстких дат — для проекта, который пока делает один человек, это было бы нечестно. Приоритеты могут меняться, в том числе под твои отзывы."
    groups:
      done:
        title: "Уже работает"
        items:
          - t: "Каталог профессий и карты развития"
            d: "Структурированный путь по каждой профессии — от основ до уверенного специалиста."
          - t: "Продуманный формат уроков"
            d: "Зачем → официальные документы → практическое задание, плюс вопросы для самопроверки."
          - t: "Качественные ссылки на источники"
            d: "Нормативы, книги, видео и инструменты с понятными бейджами по типу."
          - t: "Правки от читателей и история изменений"
            d: "Любой может предложить улучшение урока; все принятые правки видны в открытой истории."
          - t: "Аккуратный тёмный интерфейс"
            d: "Чистый дизайн на чистом CSS, адаптированный под телефон."
          - t: "Первые профессии"
            d: "Электрик — полный путь; сварщик, сантехник и инженер АСУ ТП — в наполнении."
          - t: "Страницы «О проекте» и эта дорожная карта"
            d: "Прозрачно рассказываем, зачем проект и куда он идёт."
      progress:
        title: "Сейчас в работе"
        items:
          - t: "Наполнение профессий"
            d: "Углубляем контент: больше уроков, разобранных примеров и проверяемых заданий."
          - t: "Схемы и иллюстрации к урокам"
            d: "Меняем плейсхолдеры на качественные схемы — половина пользы в наглядности."
      planned:
        title: "Запланировано"
        items:
          - t: "Аккаунты и вход"
            d: "Личный профиль без лишней сложности."
          - t: "Отметка «пройдено» и прогресс"
            d: "Просто: сделано / не сделано, и наглядный прогресс по профессии."
          - t: "Двухколоночный режим чтения"
            d: "На десктопе — оглавление сбоку, чтобы не терять контекст урока."
          - t: "Поиск по профессиям и урокам"
            d: "Быстро найти нужную тему или документ."
          - t: "Сообщество и свои направления, если ты специалист"
            d: "Возможность предлагать и вести курсы — с обязательной модерацией (безопасность прежде всего)."
          - t: "Страновые варианты допусков"
            d: "Документы для Казахстана и других стран — основа уже заложена (поле country_code)."
      future:
        title: "В будущем — по реальному запросу"
        items:
          - t: "Верифицируемые сертификаты"
            d: "Возможно платно — за результат, не за вход; бесплатная публичная проверка по QR. Только когда появится спрос и надежный механизм проверки навыков и выполненных практических заданий."
          - t: "Тесты для самопроверки"
            d: "Короткие квизы по уроку, чтобы закрепить материал."
          - t: "Больше профессий"
            d: "HVAC-техник, оператор ЧПУ, монтажник и другие — по запросу сообщества."
          - t: "Англоязычная версия"
            d: "Когда появится аудитория за пределами русскоязычного пространства."
      not_now:
        title: "Сознательно не делаем сейчас"
        items:
          - t: "Мобильное приложение"
            d: "Адаптивного сайта достаточно ещё надолго."
          - t: "Публичный API"
            d: "Нет реальных потребителей — добавим, когда появятся."
          - t: "Геймификация и стрики"
            d: "Удержанием занимаются, когда уже есть аудитория и контент."
          - t: "Визуальные графы-схемы пути"
            d: "Аудитории нужны понятные списки, а не блок-схемы."
          - t: "Комментарии и форум"
            d: "Сложная динамика; добавим, только если попросят."
    os_title: "Открытый проект"
    os_text: "IndustrialProfi — open source. Платформа, контент и прогресс бесплатны навсегда, а код открыт под лицензией AGPL-3.0. Деньги — только за результат (будущие сертификаты), никогда за вход."
    help_title: "Как помочь"
    help_text: "Предложи правку к уроку, поделись опытом мастера, расскажи коллегам, поддержи проект или просто напиши мне — я открыт к идеям и отзывам."
