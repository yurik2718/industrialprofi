      length: "Длина линии в одну сторону, L"
      section: "Сечение жилы, S"
      material: "Материал жилы"
      laying: "Способ прокладки"
      value: "Значение"
      unit: "Единица измерения"
    options:
      phase_1: "Однофазная, 220 В"
      phase_3: "Трёхфазная, 380 В"
      material_cu: "Медь"
      material_al: "Алюминий"
      laying_air: "Открыто, в воздухе"
      laying_pipe: "В трубе или канале"
    ohms-law:
      title: "Закон Ома: калькулятор тока, напряжения, сопротивления"
      tagline: "Введите любые два значения из U, I, R, P — остальные посчитаются."
      intro: "Закон Ома связывает напряжение, ток и сопротивление, а формула мощности добавляет четвёртую величину. Заполните любые два поля — калькулятор выведет оставшиеся два."
      norm: "Формулы: U = I·R и P = U·I (закон Ома и определение мощности постоянного тока)."
      fields_hint: "Заполните любые два поля — остальные рассчитаются автоматически."
    power-current:
      title: "Расчёт тока по мощности: калькулятор (220 и 380 В)"
      tagline: "Ток нагрузки по мощности, напряжению и cos φ — для подбора автомата и кабеля."
      intro: "Чтобы подобрать автомат и кабель, нужен рабочий ток нагрузки. Он считается по мощности с учётом напряжения и коэффициента мощности. Для трёхфазной сети в формуле появляется множитель √3."
      norm: "1-ф: I = P / (U·cos φ); 3-ф: I = P / (√3·U·cos φ)."
      result_current: "Рабочий ток, I"
      result_apparent: "Полная мощность, S"
      info:
        apparent: "Полная мощность S (кВА) — нагрузка с учётом реактивной части. По ней выбирают генератор, ИБП и трансформатор; активная мощность (кВт) всегда меньше."
    voltage-drop:
      title: "Расчёт потерь напряжения в кабеле: калькулятор"
      tagline: "Потеря напряжения на длинной линии в вольтах и процентах."
      intro: "На длинной линии часть напряжения теряется на сопротивлении жилы — у потребителя его становится меньше. Калькулятор оценивает потерю по материалу, сечению, длине и току."
      norm: "ΔU = k·ρ·L·I / S, где k = 2 (1-ф) или √3 (3-ф); ρ — удельное сопротивление (медь 0,0175; алюминий 0,0294 Ом·мм²/м)."
      result_drop: "Падение напряжения, ΔU"
      result_percent: "Падение напряжения, ΔU"
      norm_note: "Норма для силовых и осветительных сетей — обычно не более 5 %. Реактивным сопротивлением жилы пренебрегаем (допустимо для сечений примерно до 50–95 мм²)."
    grounding:
      title: "Расчёт заземления: калькулятор контура (ПУЭ)"
      tagline: "Сопротивление вертикального заземлителя и сколько электродов нужно для нормы."
      intro: "Заземляющее устройство должно иметь сопротивление не выше нормы (для большинства электроустановок — 4 Ом). Калькулятор оценивает сопротивление одного вертикального электрода и группы, а также сколько электродов нужно забить, чтобы уложиться в норму. Удельное сопротивление грунта берётся с сезонным (климатическим) коэффициентом."
      norm: "R₁ = ρ·ψ/(2π·L)·[ln(2L/d) + 0,5·ln((4t+L)/(4t−L))], t = h + L/2; Rгруппы = R₁/(n·η). Нормы — ПУЭ гл. 1.7."
      rho: "Удельное сопротивление грунта, ρ"
      rho_hint: "суглинок ~100, глина ~60, песок ~500, чернозём ~50"
      psi: "Климатическая зона (коэффициент ψ)"
      psi_1: "I зона, сильное промерзание ×2,0"
      psi_2: "II зона ×1,7"
      psi_3: "III зона ×1,5"
      psi_4: "IV зона, юг ×1,3"
      length: "Длина электрода, L"
      diameter: "Диаметр электрода, d"
      depth: "Глубина заложения верха, h"
      count: "Число электродов, n"
      eta: "Коэффициент использования, η"
      eta_hint: "1 для одиночного; ~0,6–0,85 для группы"
      target: "Требуемое сопротивление"
      result_single: "Сопротивление одного электрода"
      result_group: "Сопротивление группы"
      result_required: "Нужно электродов для нормы"
      info:
        rho: "Удельное сопротивление грунта — насколько грунт проводит ток. Зависит от типа и влажности: песок проводит плохо (большое ρ), глина — хорошо (малое)."
        psi: "Сезонный (климатический) коэффициент — запас на то, что промёрзший зимой грунт проводит ток хуже. Чем суровее климатическая зона, тем он больше."
        eta: "Коэффициент использования — электроды рядом мешают друг другу, и группа работает хуже суммы по отдельности. Зависит от их числа и расстояния между ними."
      note: "Оценка для вертикальных электродов; горизонтальный соединитель (полоса) не учтён — он немного снижает итог. Коэффициент использования η зависит от числа электродов и расстояния между ними (берётся из таблиц ПУЭ/справочника)."
    short-circuit:
      title: "Расчёт тока КЗ: калькулятор (петля фаза-ноль)"
      tagline: "Ток однофазного КЗ в конце линии и сработает ли мгновенный расцепитель автомата."
      intro: "Чтобы автомат отключил короткое замыкание мгновенно, ток КЗ в самой дальней точке линии должен быть достаточно большим. Калькулятор оценивает ток петли «фаза-нуль» по сопротивлению линии и питающей сети и сравнивает его с порогом срабатывания автомата."
      norm: "Iₖ = Uф/(Zвнеш + Zп), Zп ≈ 2·ρ·L/S. Гарантированное мгновенное отключение — при Iₖ ≥ k·Iₙ по верхней границе полосы (k: B=5, C=10, D=20, ГОСТ IEC 60898). Метод по ГОСТ 28249, требование — ПУЭ 1.7.79 / ГОСТ Р 50571."
      uf: "Фазное напряжение, Uф"
      zext: "Сопротивление до щита, Zвнеш"
      zext_hint: "трансформатор + магистраль; ~100 кВА ≈ 0,1; ~250 кВА ≈ 0,04; или измеренное Z петли"
      length: "Длина линии до точки КЗ, L"
      inom: "Номинал автомата, Iₙ"
      char: "Характеристика автомата"
      char_b: "B (×3…5)"
      char_c: "C (×5…10)"
      char_d: "D (×10…20)"
      result_zloop: "Сопротивление петли, Zп"
      result_ikz: "Ток КЗ, Iₖ"
      result_ratio: "Кратность к автомату"
      info:
        zext: "Сопротивление до щита — трансформатор плюс магистраль до него. Можно прикинуть по мощности трансформатора или измерить прибором сопротивление петли «фаза-нуль»."
        char: "Характеристика автомата (B/C/D) — во сколько раз ток КЗ должен превысить номинал, чтобы сработал мгновенный расцепитель: B — в 3–5, C — в 5–10, D — в 10–20 раз."
        ratio: "Во сколько раз ток КЗ больше номинала автомата. Должен быть выше верхней границы характеристики — тогда автомат отключит замыкание мгновенно."
      note: "Зелёная кратность (≥ верхней границы: B×5, C×10, D×20) — автомат гарантированно отключает КЗ мгновенно. Красная — мгновенного отключения может не быть, нужна проверка по времятоковой характеристике или меньшее сечение/номинал. Реактивным и переходными сопротивлениями пренебрегаем — для проекта считайте по ГОСТ 28249 полностью."
    rcd:
      title: "Расчёт тока утечки и выбор УЗО: калькулятор"
      tagline: "Расчётный ток утечки линии и проверка, не будет ли УЗО ложно срабатывать."
      intro: "УЗО срабатывает на ток утечки, но у исправной проводки и техники тоже есть естественная утечка. Чтобы не было ложных отключений, рабочий ток утечки должен быть не больше трети номинала УЗО. Калькулятор оценивает ток утечки по нагрузке и длине проводки и сравнивает с выбранной уставкой."
      norm: "Iутечки = 0,4 мА·Iнагр + 0,01 мА·Lпровода; рабочий ток утечки ≤ ⅓ номинала УЗО (ПУЭ 7.1.83). Уставка 30 мА — защита человека, 100/300 мА — противопожарная."
      current: "Ток нагрузки линии, I"
      length: "Длина фазного проводника, L"
      setting: "Номинал (уставка) УЗО, IΔn"
      setting_10: "10 мА — отдельные группы"
      setting_30: "30 мА — розетки, влажные зоны"
      setting_100: "100 мА — противопожарное"
      setting_300: "300 мА — вводное, противопожарное"
      result_ileak: "Расчётный ток утечки"
      result_threshold: "Допустимо (⅓ уставки)"
      note: "Зелёный — ток утечки в пределах ⅓ номинала, ложных срабатываний не ожидается. Красный — близко к порогу: разбейте линию на несколько УЗО или возьмите большую уставку (но 30 мА для защиты человека снижать нельзя). Оценка по эмпирике ПУЭ; реальную утечку покажет измерение."
    cable-cross-section:
      title: "Расчёт сечения кабеля по мощности и току (ПУЭ)"
      tagline: "Минимальное сечение жилы по длительно допустимому току — медь и алюминий."
      intro: "Сечение жилы выбирают так, чтобы кабель не перегревался под рабочим током. Укажите ток напрямую или мощность нагрузки — калькулятор подберёт наименьшее сечение из таблиц длительно допустимых токов ПУЭ."
      norm: "ПУЭ-7, гл. 1.3: таблицы 1.3.4 / 1.3.6 (медь) и 1.3.7 / 1.3.8 (алюминий) — длительно допустимые токи проводов и кабелей."
      power_hint: "или укажите ток ниже"
      current_hint: "если знаете — заполните вместо мощности"
      result_current: "Расчётный ток, I"
      result_section: "Рекомендуемое сечение, S"
      result_allowed: "Допустимый ток сечения"
      result_breaker: "Рекомендуемый автомат"
      info:
        allowed: "Длительно допустимый ток — какой ток жила выдерживает постоянно, не перегреваясь. Должен быть не меньше расчётного тока нагрузки."
      factors_note: "Базовый подбор без поправочных коэффициентов на температуру среды, группировку кабелей и тип изоляции. Номинал автомата выбран так, чтобы защитить кабель (Iₙ ≤ Iдоп) и пропустить нагрузку (Iₙ ≥ Iрасч); итог уточняйте по селективности и характеристике (B/C/D). Для проекта применяйте коэффициенты по ПУЭ и ГОСТ Р 50571.5.52."
    ma-scaling:
      title: "Масштабирование сигнала 4-20 мА: калькулятор онлайн"
      tagline: "Перевод токовой петли ↔ физическая величина в обе стороны."
      intro: "Датчик передаёт измеряемую величину линейным током 4–20 мА: 4 мА — нижняя граница диапазона, 20 мА — верхняя. Задайте диапазон и переводите ток в величину и обратно."
      norm: "Линейное масштабирование: величина = Hₙ + (I − Iₙ)/(Iᵥ − Iₙ)·(Hᵥ − Hₙ). Стандарт сигнала — ГОСТ 26.011, диапазон 4–20 мА."
      range_heading: "Диапазон измерения и сигнала"
      range_min: "Нижняя граница диапазона"
      range_max: "Верхняя граница диапазона"
      signal_min: "Ток нижней границы"
      signal_max: "Ток верхней границы"
      to_eu_heading: "Ток → величина"
      signal_value: "Сигнал тока"
      result_eu: "Измеряемая величина"
      result_percent: "Доля диапазона"
      to_ma_heading: "Величина → ток"
      eu_value: "Измеряемая величина"
      result_ma: "Сигнал тока"
      info:
        eu: "Инженерные (физические) единицы — то, что реально измеряет датчик: °C, бар, м³/ч и т. п. Калькулятор переводит ток сигнала в эту величину."
        percent: "Доля диапазона — где сигнал между нижней и верхней границей: 4 мА = 0 %, 12 мА = 50 %, 20 мА = 100 %."
    pressure:
      title: "Перевод единиц давления: бар, МПа, кгс/см², онлайн"
      tagline: "Манометры в кгс/см², датчики в МПа, импорт в bar и psi — переведите в один ввод."
      intro: "В КИПиА давление приходит в разных единицах: старые манометры в кгс/см², датчики и проект в МПа и бар, напор и тяга в мм вод. ст., вакуум в мм рт. ст., импорт в psi. Введите значение в одной единице — получите сразу во всех остальных."
      norm: "Единица СИ — паскаль (Па); все переводы идут через паскали (ГОСТ 8.417). 1 кгс/см² ≈ 0,0981 МПа ≈ 0,981 бар (техническая атмосфера)."
      units:
        bar: "бар"
        kpa: "кПа"
        mpa: "МПа"
        pa: "Па"
        kgf: "кгс/см² (ат)"
        atm: "атм (физ.)"
        psi: "psi (фунт/дюйм²)"
        mmhg: "мм рт. ст."
        mmh2o: "мм вод. ст."
    resistance-thermometer:
      title: "Pt100: перевод сопротивления в температуру (ГОСТ 6651)"
      tagline: "Перевод сопротивления термопреобразователя в температуру и обратно — НСХ ГОСТ 6651."
      intro: "Термопреобразователь сопротивления (ТСМ, ТСП, Pt100) меняет сопротивление с температурой нелинейно. Выберите тип датчика — и переводите температуру в сопротивление при поверке и наладке, или измеренное сопротивление обратно в температуру."
      norm: "Уравнение Каллендара–Ван Дюзена по ГОСТ 6651-2009. Платина: α 0,00385 (Pt) и 0,00391 (П); медь: α 0,00428 (М). Учтены отдельные ветви для t < 0 и t ≥ 0 °C."
      type_heading: "Тип датчика (НСХ)"
      type: "Термопреобразователь"
      to_r_heading: "Температура → сопротивление"
      temperature: "Температура, t"
      result_r: "Сопротивление, R"
      to_t_heading: "Сопротивление → температура"
      resistance: "Сопротивление, R"
      result_t: "Температура, t"
      info:
        type: "Тип (НСХ) — номинальная статическая характеристика: какому сопротивлению соответствует температура. Pt100 — платина 100 Ом при 0 °C, 100М — медь; буква (П/М) и α задают точную зависимость."
    measurement-error:
      title: "Калькулятор погрешности измерения и класса точности"
      tagline: "Абсолютная, относительная и приведённая погрешность + проверка годности по классу точности."
      intro: "При поверке прибор сравнивают с эталоном: считают абсолютную, относительную и приведённую погрешность и проверяют, укладывается ли она в класс точности. Введите показание прибора, действительное значение и нормирующее значение — калькулятор посчитает все три погрешности и вынесет вердикт."
      norm: "Δ = изм − действ; δ = Δ/действ·100 %; γ = Δ/Xн·100 % (Xн — нормирующее значение). Прибор годен при |γ| ≤ класса точности. Классы — ГОСТ 8.401-80."
      measured: "Показание прибора"
      actual: "Действительное (эталон)"
      span: "Нормирующее значение, Xн"
      span_hint: "обычно верхний предел диапазона измерения"
      cls: "Класс точности прибора"
      cls_hint: "приведённая допустимая погрешность, %: 0,1 / 0,25 / 0,5 / 1,0 / 1,5"
      result_abs: "Абсолютная погрешность, Δ"
      result_rel: "Относительная погрешность, δ"
      result_red: "Приведённая погрешность, γ"
      result_limit: "Допустимо по классу"
      info:
        span: "Нормирующее значение — база для приведённой погрешности, обычно верхний предел шкалы. Например, у манометра 0–10 бар это 10 бар."
        cls: "Класс точности — допустимая приведённая погрешность в процентах, указана на шкале прибора (0,5; 1,0; 1,5…). Прибор годен, если погрешность не превышает класс."
        red: "Приведённая погрешность — погрешность относительно всей шкалы, а не текущего значения. Именно её сравнивают с классом точности."
      note: "Зелёный результат — приведённая погрешность в пределах класса точности (прибор годен), красный — превышение (брак / нужна регулировка). Знак Δ показывает направление: «+» прибор завышает, «−» занижает."
    valve-kv:
      title: "Расчёт Kvs регулирующего клапана: онлайн калькулятор"
      tagline: "Подбор пропускной способности клапана для жидкости и проверка расхода по Kvs."
      intro: "Регулирующий клапан подбирают по пропускной способности Kv — расходу воды через полностью открытый клапан при перепаде 1 бар. Задайте расход и перепад давления — калькулятор посчитает требуемый Kv, а по выбранному Kvs проверит, какой расход клапан пропустит."
      norm: "Kv = Q·√(ρотн/ΔP), ρотн = ρ/1000 (вода = 1), Q в м³/ч, ΔP в бар (ГОСТ 23866 / IEC 60534, турбулентный режим для жидкости). Берут Kvs с запасом +20…30 % к расчётному Kv."
      common_heading: "Среда и перепад"
      dp: "Перепад на клапане, ΔP"
      rho: "Плотность среды, ρ"
      rho_hint: "вода 1000, нефтепродукты ~800"
      size_heading: "Подбор Kv по расходу"
      q: "Расход, Q"
      result_kv: "Требуемый Kv"
      check_heading: "Проверка по Kvs клапана"
      kvs: "Kvs клапана"
      result_q: "Пропустит расход"
      info:
        dp: "Перепад давления — разница давления до и после клапана при рабочем расходе. Чем меньше перепад, тем больший Kv нужен."
        kvs: "Kvs — пропускная способность полностью открытого клапана (м³/ч воды при перепаде 1 бар), из паспорта. Берут с запасом 20–30 % к расчётному Kv."
        kv: "Kv — какая пропускная способность нужна для вашего расхода и перепада. По нему подбирают клапан с ближайшим бóльшим Kvs."
    twisted-pair-line:
      title: "PoE-калькулятор: длина линии и падение напряжения"
      tagline: "Падение напряжения PoE, напряжение на устройстве и предельная длина по витой паре."
      intro: "По витой паре питание PoE теряется на сопротивлении жил — до устройства доходит меньше, чем выдаёт коммутатор, и на длинной линии PoE-камера или точка доступа может не запуститься. Выберите стандарт PoE и сечение жилы (AWG) — калькулятор оценит падение напряжения, напряжение на устройстве и предельную длину."
      norm: "ΔU = I·Rшлейфа; PoE 802.3af/at — 2 пары (Rшлейфа = Rж·L), 802.3bt — 4 пары (Rж·L/2). Длина канала ограничена 100 м по ISO/IEC 11801 и ГОСТ Р 53246."
      standard: "Стандарт PoE"
      std_af: "802.3af (PoE, 15,4 Вт)"
      std_at: "802.3at (PoE+, 30 Вт)"
      std_bt3: "802.3bt Type 3 (PoE++, 60 Вт)"
      std_bt4: "802.3bt Type 4 (90 Вт)"
      awg: "Сечение жилы"
      awg_24: "AWG 24 (0,205 мм²) — Cat5e/Cat6"
      awg_23: "AWG 23 (0,258 мм²) — Cat6/6A"
      awg_26: "AWG 26 (0,129 мм²) — патч-корд"
      awg_22: "AWG 22 (0,326 мм²)"
      length: "Длина линии, L"
      current: "Ток PoE, I"
      vpse: "Напряжение источника, U"
      preset_hint: "пусто — взять из стандарта"
      result_rloop: "Сопротивление шлейфа"
      result_vdrop: "Падение напряжения, ΔU"
      result_vpd: "Напряжение на устройстве"
      result_lmax: "Предельная длина"
      info:
        std: "Стандарт PoE задаёт мощность и ток питания по кабелю: af — до 15 Вт, at (PoE+) — 30 Вт, bt — 60–90 Вт. af/at используют 2 пары, bt — все 4."
        awg: "AWG — американский калибр провода: чем больше номер, тем тоньше жила и больше потери. AWG 24 — типовой Cat5e/Cat6, AWG 26 — тонкий патч-корд."
        vpd: "Сколько вольт доходит до устройства после потерь в кабеле. Должно быть не ниже минимума для его стандарта PoE, иначе устройство не запустится (красный)."
      note: "Оценка по постоянному сопротивлению медной жилы при 20 °C; CCA (омеднённая) и нагрев дают больше потерь. Предельная длина ограничена и питанием, и каналом передачи данных (100 м)."
    subnet:
      title: "Калькулятор подсетей IPv4: маска, диапазон, CIDR"
      tagline: "Адрес и префикс CIDR → маска, сеть, broadcast, диапазон и число хостов."
      intro: "При настройке сети АСУ ТП (ПЛК, SCADA, HMI) нужно быстро разбить адресное пространство и проверить, попадают ли устройства в одну подсеть. Введите IP-адрес и префикс — калькулятор покажет маску, адрес сети, широковещательный адрес, диапазон и число доступных хостов."
      norm: "Маска из префикса /n; сеть = IP AND маска; broadcast = сеть OR wildcard. Бесклассовая адресация — RFC 4632 (CIDR); /31 и /32 — RFC 3021."
      ip: "IP-адрес"
      prefix: "Префикс /CIDR"
      prefix_hint: "от 0 до 32 (например, 24 = маска 255.255.255.0)"
      result_network: "Адрес сети"
      result_mask: "Маска подсети"
      result_wildcard: "Wildcard (обратная маска)"
      result_broadcast: "Широковещательный адрес"
      result_hostmin: "Первый хост"
      result_hostmax: "Последний хост"
      result_hosts: "Число хостов"
      info:
        prefix: "Префикс CIDR — сколько первых бит адреса отведено под номер сети. Запись /24 — это маска 255.255.255.0 (24 бита под сеть)."
        network: "Первый адрес подсети — обозначает саму сеть. Устройству его не назначают."
        mask: "Маска делит адрес на номер сети и номер устройства: единицы маски — это сеть, нули — место под адреса устройств."
        wildcard: "Обратная маска — инверсия обычной (где у маски 0, тут 1). Нужна в списках доступа ACL на сетевом оборудовании, например Cisco."
        broadcast: "Широковещательный адрес — последний в подсети. Пакет на него получают все устройства сети; отдельному устройству его не назначают."
        hosts: "Сколько устройств можно подключить в этой подсети. Адрес сети и широковещательный в счёт не идут."
    modbus-rtu:
      title: "Расчёт времени опроса Modbus RTU: цикл и трафик"
      tagline: "Время чтения регистров по Modbus RTU и сколько займёт опрос всех устройств."
      intro: "По Modbus RTU мастер опрашивает устройства по очереди, и на низкой скорости полный цикл может занять заметное время — это определяет, как быстро SCADA видит данные. Задайте скорость, число регистров и устройств — калькулятор посчитает время одной транзакции и всего цикла опроса."
      norm: "Кадр запроса (FC03) — 8 байт, ответа — 5 + 2·N байт. Время байта = бит/байт ÷ скорость; пауза t3.5 = 3,5 символа (≤ 19200 бод) или 1,75 мс (выше). Транзакция = (запрос+ответ)·tбайт + 2·t3.5 + ответ slave."
      baud: "Скорость, бод"
      format: "Формат кадра"
      format_11: "11 бит/символ (8E1, 8O1, 8N2)"
      format_10: "10 бит/символ (8N1)"
      registers: "Регистров в запросе, N"
      devices: "Число устройств на шине"
      delay: "Задержка ответа slave"
      delay_hint: "время обработки в устройстве, типично 0–20 мс"
      result_respbytes: "Размер ответа"
      result_ttrans: "Время транзакции"
      result_rate: "Опросов в секунду"
      result_tcycle: "Полный цикл всех устройств"
      info:
        format: "Сколько бит уходит на один байт в линии с учётом служебных. 8N1 (без контроля чётности) — 10 бит; с чётностью или двумя стоп-битами — 11 бит."
        ttrans: "Сколько длится один обмен «запрос-ответ» с одним устройством. Из него складывается, как часто успевают опрашиваться все устройства."
        tcycle: "Время опроса всех устройств по очереди — через столько обновляются данные в SCADA. Для быстрых контуров его уменьшают скоростью или числом регистров."
      note: "Оценка для чтения регистров (FC03) без учёта повторов при ошибках и задержек преобразователей RS-485/USB. Время цикла растёт линейно с числом устройств — для быстрых контуров поднимайте скорость или уменьшайте число регистров за опрос."

