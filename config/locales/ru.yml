  about:
    page_title: "О проекте — industrialprofi.com"
    eyebrow: "Письмо создателя"
    title: "Почему я создал IndustrialProfi.com"
    greeting: "Привет."
    intro1: "Меня зовут Андрей. Я независимый разработчик и имею насыщенный опыт инженера АСУ ТП: контроллеры, схемы, пусконаладка, ночные смены на объектах. И всю дорогу меня не отпускало одно чувство — я изучаю всё вслепую. При этом я закончил магистратуру в одном из лучших вузов по АСУ, но цельной картины профессии я там так и не сформировал. Мы изучали много того, что никогда я не использовал в практике и очень мало, действительно, полезных в работе материалов. Не было места, где основы объяснены просто, цельно и по делу; где за глубиной тебя отправляют к официальной документации и хорошему видео, а не к пересказу; и главное — где дают практические задачи, похожие на те, с которыми завтра столкнёшься на реальном объекте. Свою профессию я собирал по крупицам: форумы, мануалы, метод проб и ошибок."
    intro2: "IndustrialProfi — это платформа, которой мне самому тогда отчаянно не хватало. Я делаю её в свободное от работы время, один, — но всерьёз и вдолгую."
    problem_title: "Проблема"
    problem1: "Посмотри, как учатся программисты: сотни бесплатных структурированных материалов — бери и расти от нуля до профессионала, не заплатив ни рубля. У рабочих и инженерных профессий — у электриков, сварщиков, наладчиков, киповцев — ничего подобного нет. Знания разбросаны по форумам, платным курсам сомнительного качества и пересказам с ошибками. Человек, который хочет освоить профессию, остаётся один на один с горой ГОСТов — без карты. А бесценный опыт мастеров заперт в головах тех, кто скоро уйдёт на пенсию, и его почти никто не записывает."
    problem2_html: 'И это не только наша беда — это мировой кризис. По данным <a href="https://go.manpowergroup.com/talent-shortage-2024" target="_blank" rel="noopener">ManpowerGroup</a>, 74% работодателей в мире не могут закрыть вакансии нужными специалистами, а <a href="https://www.weforum.org/publications/the-future-of-jobs-report-2025/" target="_blank" rel="noopener">Всемирный экономический форум</a> называет нехватку навыков главным барьером для роста компаний. Острее всего не хватает именно тех, кто создаёт осязаемую, физическую ценность: в <a href="https://www.ela.europa.eu/sites/default/files/2025-06/EURES_Report_on_labour_shortages_and_surpluses_2024.pdf" target="_blank" rel="noopener">странах Евросоюза</a> дефицит электриков, сварщиков и монтажников признан почти повсеместно — мастера уходят быстрее, чем приходит смена.'
    highlight_deficit: "Специалисты, которые умеют работать руками и головой одновременно, — сегодня в красной книге. Их критически мало во всём мире, и дальше дефицит будет только острее."
    chance_title: "Почему это твой шанс"
    chance1: "Дефицит — это не только проблема экономики. Это возможность для конкретного человека. Востребованное ремесло — валюта, которая не обесценивается: хорошего специалиста ищут везде (даже в кризис за таких людей держатся до последнего, так как их критический дефицит), от райцентра до столицы, и со временем он сам выбирает, где, с кем и за сколько работать. Для этого не нужны ни связи, ни богатые родители, ни столичная прописка. Нужны карта, дисциплина и годы честной практики."
    highlight_chance: "Если ты из небольшого города или деревни и хочешь обеспечить своей семье достойную жизнь — один из самых реальных путей к этому: стать экспертом мирового уровня в востребованной полезной профессии."
    chance2_html: 'Скажу честно про сроки: это не пара месяцев, а годы ежедневного труда — недаром формальное ученичество у электриков и сварщиков длится 4–5 лет. Но решают не «отсиженные часы». <a href="https://www.salon.com/2016/04/10/malcolm_gladwell_got_us_wrong_our_research_was_key_to_the_10000_hour_rule_but_heres_what_got_oversimplified/" target="_blank" rel="noopener">Андерс Эрикссон</a> — учёный, чьи работы стоят за «правилом 10 000 часов», — показал, что магического числа нет: рост даёт только осознанная практика, на пределе возможностей и с обратной связью. Именно так построен каждый урок здесь: прочитал первоисточник → сделал руками → записал результат. В эпоху, когда профессии меняются на глазах, умение быстро переучиваться и структурировать знания — само по себе суперсила. Здесь ты тренируешь и её.'
    how_title: "Как устроена платформа"
    how1: "Мы — библиотекарь, а не лектор. Мы живём в по-настоящему уникальное время: лучший опыт мастеров со всего мира — Германии, Японии, Голландии, США — перестал быть за семью замками, и его можно изучить и применить у себя. Наша задача — собрать его. По каждой теме мы кратко и структурно, иногда со схемами и рисунками, объясняем основы, чтобы сложилась картина, — а за глубиной отправляем к качественным источникам: официальным документам там, где они есть (ГОСТ, ПУЭ, ПТЭЭП), и к лучшим в мире книгам, видео и разборам там, где стандарта нет. Всё это — проверенными ранжированными ссылками, выстроенными в удобный последовательный путь, а не свалкой."
    how_practice: "И каждый урок заканчивается практическим заданием, максимально близким к реальной работе, или вопросами для самопроверки. Это не довесок: без практики и проверки себя чтение почти ничего не даёт — набить руку можно только руками. Результат фиксируешь в дневнике практики — так копится не «прослушанный курс», а настоящий опыт."
    how_docs: "При этом мы уважаем местные правила. Где профессию регулируют официальные документы — ГОСТ, ПУЭ, НАКС, — обойти их чтение нельзя. Да, читать нормативку скучно. Но именно в этих сухих текстах спрятаны нюансы, на которых держатся безопасность и качество, — поэтому мы честно ведём тебя и к ним, а не подменяем пересказом."
    how2: "И есть то, без чего нельзя: в наших профессиях плохой совет не просто раздражает — он калечит. Цена ошибки — сожжённое оборудование, а иногда и жизнь. Поэтому безопасность здесь всегда на первом месте, а не в примечании мелким шрифтом."
    vision_title: "Каким я вижу проект"
    vision1_html: 'Лучшая открытая платформа рабочих профессий для всего СНГ и русскоязычного пространства. Бесплатная не на время акции, а навсегда: официальные стандарты публичны, наша задача — выстроить их в понятный путь и добавить практику. Код открыт под свободной лицензией AGPL-3.0 на <a href="%{github_url}" target="_blank" rel="noopener">GitHub</a>, материалы — под CC BY-SA, чтобы если что-то со мной случится, то всегда можно было бы код проекта форкнуть и продолжить развитие без меня. Дальше я вижу платформу, которую двигает сообщество: опытные мастера и инженеры ведут карты своих профессий под своим именем, эксперты проверяют правки, а проект живёт и развивается уже не силами одного человека, а сообщества единомышленников с горящими глазами и с любовью к своему делу.'
    vision2: "В целом, я смотрю шире промышленности. Платформа построена так, чтобы вместить любую востребованную профессию, где решают руки и практика, — строителя, фермера, механика. Но здесь важна честность: сам я могу сделать хорошо только то, в чём работал. Карту твоей профессии можешь сделать только ты — практик, который прошёл её на собственном опыте. Поэтому это письмо — ещё и приглашение."
    highlight_world: "Если такой ресурс получится, все мы будем жить в чуть лучшем мире — где путь в профессию ясен каждому, независимо от того, где он родился и сколько у него денег."
    invite: "Пока я делаю всё сам: код, тексты, проверку материалов, ответы каждому. Поэтому мне нужен ты — тот, кто читает эти строки. Нашёл неточность — предложи правку прямо в уроке, это две минуты и можно без аккаунта. Ты мастер или инженер с опытом — напиши мне: сделаем раздел или карту твоей профессии с твоим именем. Просто хочешь, чтобы проект жил, — расскажи о нём коллеге."
