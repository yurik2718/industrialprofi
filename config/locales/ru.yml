    cta_support: "Поддержать проект"
    cta_telegram: "Написать в Telegram"

  support:
    page_title: "Поддержать проект — IndustrialProfi"
    title: "Поддержи проект"
    intro: "IndustrialProfi бесплатен с первого дня — и таким останется. Я хочу, чтобы любой, кто решил освоить рабочую профессию, мог учиться по качественным материалам и не платить за это. Твоя поддержка помогает держать проект живым и делать его лучше."
    donate_cta: "Поддержать проект"
    faq_title: "Частые вопросы"

    q_how_money: "На что пойдут деньги?"
    a_how_money: "Деньги идут на серверы, домен и инфраструктуру, а главное — на новый контент: поиск, проверку и структурирование официальных стандартов и практических заданий. Все расходы прозрачны."

    q_how_donate: "Как поддержать?"
    a_how_donate: "Поддержать можно через CloudTips — карты, СБП и другие способы оплаты. Разовый платёж или регулярная подписка — любая сумма помогает."

    q_why_free: "Почему проект бесплатный?"
    a_why_free: "Я убеждён: доступ к качественному обучению ремеслу не должен зависеть от толщины кошелька. Официальные стандарты — ГОСТ, ПУЭ, ПТЭЭП — публичны. Моя задача лишь собрать их в понятный путь, добавить практику и сделать обучение ясным. Это должно быть доступно каждому."

    q_surplus: "А если пожертвований будет больше, чем нужно?"
    a_surplus: "Всё, что сверх необходимого, пойдёт на развитие: новые профессии, улучшение готовых материалов, систему отслеживания прогресса и мобильную версию."

    q_other_help: "У меня нет возможности задонатить. Как ещё помочь?"
    a_other_help: "Способов много. Расскажи о проекте коллегам и друзьям, поделись ссылкой в профильных чатах и группах. Если ты опытный мастер — поделись знаниями или помоги проверить материалы. Если ты разработчик — проект с открытым исходным кодом, и я рад любому вкладу."

    q_who_created: "Кто стоит за IndustrialProfi?"
    a_who_created_html: 'Пока проект делаю я один — код, тексты, дизайн, поддержка людей в Telegram, и всё это в часы после основной работы. Зачем и почему я за это взялся — подробно рассказал в <a href="%{about_url}">письме «О проекте»</a>. Хочешь помочь или просто поговорить — пиши мне напрямую.'

    q_contact: "Как с тобой связаться?"
    a_contact_html: 'Напиши мне в <a href="%{telegram_url}" target="_blank" rel="noopener">Telegram</a>. Отвечаю в течение пары дней.'

