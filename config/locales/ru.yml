  privacy:
    eyebrow: "Правовая информация"
    title: "Политика конфиденциальности"
    updated: "Редакция от 21 июня 2026 года"
    intro: "Эта Политика объясняет, какие данные мы собираем, зачем и как защищаем. Коротко: мы собираем минимум необходимого, не показываем рекламу и не продаём ваши данные никому."
    operator_title: "1. Кто обрабатывает данные"
    operator_html: "<p>Оператором персональных данных является автор и владелец проекта IndustrialProfi (industrialprofi.com). По любым вопросам об обработке данных свяжитесь с нами — контакты в конце страницы.</p>"
    data_title: "2. Какие данные мы собираем"
    data_html: "<p>Только то, что необходимо для работы сервиса:</p><ul><li><strong>При регистрации</strong> — адрес электронной почты и имя, которое вы укажете.</li><li><strong>Пароль</strong> хранится только в виде криптографического хеша; в открытом виде мы его не видим и не храним.</li><li><strong>Прогресс обучения</strong> — какие уроки вы отметили пройденными.</li><li><strong>Дневник практики</strong> — ваши текстовые записи. Они приватны и видны только вам.</li><li><strong>Технические данные сессии</strong> — IP-адрес и сведения о браузере, для входа и безопасности аккаунта.</li></ul>"
    purposes_title: "3. Зачем мы это используем"
    purposes_html: "<ul><li>предоставить вам аккаунт и сохранять прогресс и дневник;</li><li>обеспечить безопасный вход;</li><li>отправлять служебные письма — код подтверждения при регистрации, восстановление пароля и необязательные напоминания о продолжении обучения (от них можно отписаться в один клик в любом письме или в настройках).</li></ul><p>Мы не используем ваши данные для рекламы и не показываем рекламу.</p>"
    legal_title: "4. Правовые основания"
    legal_html: "<p>Обработка ведётся на основании вашего согласия, которое вы даёте при регистрации, и для исполнения соглашения об использовании сервиса (Федеральный закон № 152-ФЗ «О персональных данных»).</p>"
    sharing_title: "5. Передача третьим лицам"
    sharing_html: "<p>Мы <strong>не продаём и не передаём</strong> ваши персональные данные третьим лицам в коммерческих целях. Данные обрабатывают только поставщики услуг, без которых сервис не работает:</p><ul><li><strong>хостинг-провайдер</strong> — на его сервере физически размещены сайт и база данных;</li><li><strong>провайдер электронной почты (SMTP)</strong> — доставляет вам служебные письма.</li></ul><p>Мы не используем сторонние системы веб-аналитики и рекламные трекеры.</p>"
    storage_title: "6. Хранение и защита"
    storage_html: "<p>Данные хранятся на защищённом сервере, доступ к сайту — только по защищённому соединению (HTTPS), пароли хешируются. Мы храним данные ровно столько, сколько существует ваш аккаунт; после его удаления связанные данные удаляются.</p>"
    cookies_title: "7. Файлы cookie"
    cookies_html: "<p>Мы используем только одну техническую cookie — она нужна, чтобы вы оставались авторизованными после входа. Рекламных и аналитических cookie у нас нет, поэтому баннер согласия не требуется.</p>"
    rights_title: "8. Ваши права"
    rights_html: "<p>Вы в любой момент можете:</p><ul><li><strong>посмотреть и изменить</strong> имя, email и пароль — в <a href=\"%{account_url}\">настройках аккаунта</a>;</li><li><strong>удалить аккаунт</strong> вместе со всеми связанными данными — там же, в настройках;</li><li><strong>отозвать согласие</strong> на письма-напоминания — ссылкой для отписки в любом письме.</li></ul>"
    changes_title: "9. Изменения политики"
    changes_html: "<p>Мы можем обновлять эту Политику. Актуальная редакция всегда доступна на этой странице, дата последнего изменения указана вверху.</p>"
    contact_title: "10. Контакты"
    contact_html: "<p>По вопросам обработки персональных данных пишите на <a href=\"mailto:%{contact_email}\">%{contact_email}</a> или через форму обратной связи на сайте.</p>"

