  about:
    page_title: "О проекте — industrialprofi.com"
    eyebrow: "Письмо создателя"
    title: "Почему я создал IndustrialProfi"
    greeting: "Привет."
    intro1: "Меня зовут Андрей. Я работал инженером АСУ ТП: контроллеры, схемы, пусконаладка, ночные смены на объектах. И всю дорогу меня не отпускало одно чувство — я изучаю вслепую. Не было места, где основы объяснены просто и по делу; где за глубиной тебя отправляют к официальной документации и хорошему видео, а не к пересказу; и главное — где дают практические задачи, похожие на те, с которыми завтра столкнёшься на реальном объекте. Свою профессию я собирал по крупицам: форумы, мануалы, метод проб и ошибок."
    intro2: "IndustrialProfi — это платформа, которой мне самому тогда отчаянно не хватало. Я делаю её в свободное от работы время, один, — но всерьёз и вдолгую."
    problem_title: "Проблема"
    problem1: "Посмотри, как учатся программисты: сотни бесплатных структурированных материалов — бери и расти от нуля до профессионала, не заплатив ни рубля. У рабочих и инженерных профессий — у электриков, сварщиков, наладчиков, киповцев — ничего подобного нет. Знания разбросаны по форумам, платным курсам сомнительного качества и пересказам с ошибками. Человек, который хочет освоить профессию, остаётся один на один с горой ГОСТов — без карты. А бесценный опыт мастеров заперт в головах тех, кто скоро уйдёт на пенсию, и его почти никто не записывает."
    problem2_html: 'И это не только наша беда — это мировой кризис. По данным <a href="https://go.manpowergroup.com/talent-shortage-2024" target="_blank" rel="noopener">ManpowerGroup</a>, 74% работодателей в мире не могут закрыть вакансии нужными специалистами, а <a href="https://www.weforum.org/publications/the-future-of-jobs-report-2025/" target="_blank" rel="noopener">Всемирный экономический форум</a> называет нехватку навыков главным барьером для роста компаний. Острее всего не хватает именно тех, кто создаёт осязаемую, физическую ценность: в <a href="https://www.ela.europa.eu/sites/default/files/2025-06/EURES_Report_on_labour_shortages_and_surpluses_2024.pdf" target="_blank" rel="noopener">странах Евросоюза</a> дефицит электриков, сварщиков и монтажников признан почти повсеместно — мастера уходят быстрее, чем приходит смена.'
    highlight_deficit: "Специалисты, которые умеют работать руками и головой одновременно, — сегодня в красной книге. Их критически мало во всём мире, и дальше дефицит будет только острее."
    chance_title: "Почему это твой шанс"
    chance1: "Дефицит — это не только проблема экономики. Это возможность для конкретного человека. Востребованное ремесло — валюта, которая не обесценивается: хорошего специалиста ищут везде, от райцентра до столицы, и со временем он сам выбирает, где, с кем и за сколько работать. Для этого не нужны ни связи, ни богатые родители, ни столичная прописка. Нужны карта, дисциплина и годы честной практики."
    highlight_chance: "Если ты из небольшого города или деревни и хочешь обеспечить своей семье достойную жизнь — один из самых реальных путей к этому: стать экспертом мирового уровня в востребованной полезной профессии."
    chance2_html: 'Скажу честно про сроки: это не пара месяцев, а годы ежедневного труда — недаром формальное ученичество у электриков и сварщиков длится 4–5 лет. Но решают не «отсиженные часы». <a href="https://www.salon.com/2016/04/10/malcolm_gladwell_got_us_wrong_our_research_was_key_to_the_10000_hour_rule_but_heres_what_got_oversimplified/" target="_blank" rel="noopener">Андерс Эрикссон</a> — учёный, чьи работы стоят за «правилом 10 000 часов», — показал, что магического числа нет: рост даёт только осознанная практика, на пределе возможностей и с обратной связью. Именно так построен каждый урок здесь: прочитал первоисточник → сделал руками → записал результат. В эпоху, когда профессии меняются на глазах, умение быстро переучиваться и структурировать знания — само по себе суперсила. Здесь ты тренируешь и её.'
    how_title: "Как устроена платформа"
    how1: "Мы — библиотекарь, а не лектор. Основы объясняем простым языком, чтобы сложилась картина. За глубиной отправляем к первоисточникам — ГОСТ, ПУЭ, ПТЭЭП — и к лучшим разборам и видео: ты учишься читать документы, по которым работает вся отрасль. И главное — каждый урок заканчивается практическим заданием, максимально близким к тому, что ждёт тебя на смене. Результат фиксируешь в дневнике с фото — так копится не «прослушанный курс», а настоящий опыт и портфолио."
    how2: "И есть то, без чего нельзя: в наших профессиях плохой совет не просто раздражает — он калечит. Цена ошибки — сожжённое оборудование, а иногда и жизнь. Поэтому безопасность здесь всегда на первом месте, а не в примечании мелким шрифтом."
    vision_title: "Каким я вижу проект"
    vision1_html: 'Лучшая бесплатная платформа рабочих профессий для всего СНГ. Бесплатная не на время акции, а навсегда: официальные стандарты публичны, наша задача — выстроить их в понятный путь и добавить практику. Код открыт под свободной лицензией AGPL-3.0 на <a href="%{github_url}" target="_blank" rel="noopener">GitHub</a>, материалы — под CC BY-SA, чтобы если что-то со мной случится, то всегда можно было бы код проекта форкнуть и продолжить развитие без меня. Дальше я вижу платформу, которую двигает сообщество: опытные мастера и инженеры ведут карты своих профессий под своим именем, эксперты проверяют правки, а проект живёт и развивается уже не силами одного человека, а сообщества единомышленников с горящими глазами и с любовью к своему делу.'
    vision2: "В целом, я смотрю шире промышленности. Платформа построена так, чтобы вместить любую востребованную профессию, где решают руки и практика, — строителя, фермера, механика. Но здесь важна честность: сам я могу сделать хорошо только то, в чём работал. Карту твоей профессии можешь сделать только ты — практик, который прошёл её на собственном опыте. Поэтому это письмо — ещё и приглашение."
    highlight_world: "Если такой ресурс получится, все мы будем жить в чуть лучшем мире — где путь в профессию ясен каждому, независимо от того, где он родился и сколько у него денег."
    invite: "Пока я делаю всё сам: код, тексты, проверку материалов, ответы каждому. Поэтому мне нужен ты — тот, кто читает эти строки. Нашёл неточность — предложи правку прямо в уроке, это две минуты и можно без аккаунта. Ты мастер или инженер с опытом — напиши мне: сделаем раздел или карту твоей профессии с твоим именем. Просто хочешь, чтобы проект жил, — расскажи о нём коллеге."
    closing: "Это не просто веб приложение. Это попытка сказать каждому, кто работает руками: твой труд достоин уважения,  а твоё развитие — честной, качественной и открытой платформы. Спасибо, что ты здесь. Давай строить её вместе."
    signature_name: "Андрей Юрик"
    signature_role: "Основатель IndustrialProfi, инженер АСУ ТП, разработчик Ruby on Rails, Rust"
    contact_html: 'Хочешь написать мне лично — я в <a href="%{telegram_url}" target="_blank" rel="noopener">Telegram</a>. Отвечаю каждому.'
    cta_explore: "Смотреть профессии"
    cta_support: "Поддержать проект"

  faq:
    eyebrow: "Вопросы и ответы"
    title: "Частые вопросы"
    intro: "Честные ответы на вопросы, которые задают чаще всего: что это за проект, почему он бесплатный, что даёт прохождение и как помочь."
    items:
      - q: "Что такое IndustrialProfi и почему всё бесплатно?"
        a_html: "IndustrialProfi — открытые карты развития для рабочих профессий: путь от основ до уверенного специалиста, собранный из официальных стандартов (ПУЭ, ГОСТ, НАКС) и практических заданий. Это открытый проект: код опубликован под лицензией AGPL-3.0, учебные материалы — под CC BY-SA. Бесплатно — потому что доступ к качественному обучению ремеслу не должен зависеть от толщины кошелька. Подвоха нет: ни рекламы, ни платных уроков, ни «премиум-доступа». Подробнее — на странице <a href=\"/about\">«О проекте»</a>."
      - q: "С чего начать?"
        a_html: "Откройте <a href=\"/paths\">каталог профессий</a>, выберите свою и идите по урокам сверху вниз — порядок не случайный: каждый урок опирается на предыдущие. Урок устроен одинаково: зачем это нужно → официальные документы, которые надо прочитать → практическое задание, которое надо сделать руками. Главный принцип: лучше один урок сегодня, чем десять «когда-нибудь»."
      - q: "Подойдёт ли мне, если я совсем новичок? А если уже работаю в профессии?"
        a_html: "Новичку — да: карты построены с нуля, без предположений «это все и так знают». Идите по порядку и не пропускайте основы и технику безопасности — они стоят в начале не для галочки. Если вы уже работаете — пройдитесь по карте как по чек-листу: пробелы находятся почти у всех, особенно в нормативной части. Начните с тем, где чувствуете неуверенность."
      - q: "Даёт ли прохождение удостоверение, группу допуска или аттестацию НАКС?"
        a_html: "<strong>Нет — и это важно понимать.</strong> Удостоверения, группы допуска по электробезопасности и аттестации НАКС выдают только аккредитованные учебные центры и комиссии — никакой сайт это не заменяет. IndustrialProfi даёт знания и практику, с которыми экзамен в учебном центре перестаёт быть лотереей: вы приходите туда подготовленным и понимаете, о чём вас спрашивают. Везде, где работа касается напряжения, давления или ответственных швов, официальный допуск обязателен. Мы пишем это прямо, потому что в рабочих профессиях самоуверенность без допуска опасна для жизни."
      - q: "Чем это отличается от платных курсов и техникума?"
        a_html: "Мы не пересказываем стандарты своими словами — мы даём ссылки на первоисточники и говорим точно: какие главы прочитать и что после этого сделать руками. Это модель «библиотекаря, а не лектора». Курсы и техникум дают документ об окончании; здесь вы получаете систему знаний и привычку работать с нормативной документацией — навык, который остаётся с вами после любой корочки и нужен на площадке каждый день."
      - q: "Сколько времени занимает прохождение?"
        a_html: "Зависит от темпа и стартового уровня — от пары месяцев до года. Карта — не марафон на скорость: уроки рассчитаны на цикл «прочитал → сделал → записал результат в дневник». Работает регулярность: 30–60 минут каждый день дают больше, чем пять часов раз в неделю. Поэтому на дашборде — карта активности по дням, а не таймеры и дедлайны."
      - q: "Зачем нужен аккаунт и что он даёт?"
        a_html: "Читать можно без аккаунта — весь контент открыт и останется открытым. Аккаунт добавляет рабочие инструменты: отметки «пройдено» и прогресс по профессии, кнопку «Продолжить» с того места, где остановились, личный дневник практики с фотографиями работ и закладки на уроках. Регистрация — это email и пароль, ничего лишнего."
      - q: "Можно ли учиться с телефона?"
        a_html: "Да, сайт полностью адаптирован под телефон — читать уроки и отмечать прогресс удобно с любого устройства. А практические задания и задуманы «в связке» с телефоном: сделали работу руками — сфотографировали результат — записали в дневник."
      - q: "Нашёл ошибку или неточность в уроке — что делать?"
        a_html: "Под каждой секцией урока есть ссылка «Предложить правку» — она работает даже без аккаунта и занимает пару минут. Правка попадает на проверку, и после принятия её увидят все читатели, а история изменений каждого урока открыта. Это самый быстрый способ сделать проект лучше — и именно так он и должен расти."
      - q: "Я опытный мастер или инженер. Как поделиться опытом?"
        a_html: "Вы — тот человек, ради которого построена половина платформы. Начните с малого: откройте уроки по своей теме и предложите правки там, где видите неточность или знаете лучше. Хотите большего — напишите мне («Написать автору» в меню под вашим именем или Telegram внизу страницы): обсудим отдельный раздел или целую карту вашей профессии — с вашим именем как автора. Вашей профессии ещё нет в каталоге? Тем более напишите: платформа задумана для любых востребованных профессий, где решают руки и практика, — от строителя до фермера. Проверенные специалисты получают права эксперта и помогают развивать материалы."
      - q: "Как ещё помочь проекту?"
        a_html: "Расскажите о проекте коллегам, ученикам и в профильных чатах — для открытого проекта это важнее денег. Можно <a href=\"/support_us\">поддержать рублём</a>: деньги идут на серверы и новый контент. Если вы разработчик — код открыт на GitHub (ссылка в подвале), вклад приветствуется."
      - q: "Кто это делает и как с вами связаться?"
        a_html: "Проект делает один человек — код, тексты, проверка материалов, ответы на письма. Зачем и почему — в письме <a href=\"/about\">«О проекте»</a>. Связаться просто: «Написать автору» на сайте (если вы вошли в аккаунт) или Telegram в подвале страницы. Читаю всё, отвечаю обычно в течение дня-двух."
    more_text: "Не нашли свой вопрос? Спросите напрямую — так этот список и пополняется."
    more_write: "Написать автору"
    more_telegram: "Спросить в Telegram"
    more_about: "О проекте"

  roadmap:
