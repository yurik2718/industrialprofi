      bronze: "Бронзовые партнёры"
      community: "Партнёры сообщества"
    cta_title: "Поддержать как компания"
    cta_text: "Мы заинтересованы в устойчивом долгосрочном развитии. Если ваша компания готова поддержать проект — напишите. Вы помогаете готовить квалифицированных специалистов и получаете охват целевой аудитории и благодарность здесь, на странице партнёров. Поддержка может быть и не только деньгами — оборудование для тестов, учебные стенды, стажировки, идеи реальных задач с производства."
