            d: "Проверенные мастера получают роль эксперта и помогают проверять правки и улучшать уроки — проект не зависит от одного человека."
          - t: "Страница «Участие»"
            d: "Открытый проект, который строят практики: как предложить правку без знания git, как взять на ведение целую профессию и почему открыт код."
          - t: "Аккуратный тёмный интерфейс"
            d: "Чистый дизайн на чистом CSS, адаптированный под телефон."
          - t: "Первые профессии"
            d: "Электрик — полный путь; сварщик и инженер АСУ ТП — в наполнении."
          - t: "Страницы «О проекте», FAQ и эта дорожная карта"
            d: "Прозрачно рассказываем, зачем проект, куда он идёт и что он честно даёт (а что — нет)."
          - t: "Поддержка проекта и партнёрство"
            d: "Страница поддержки с разовыми и регулярными донатами и открытая страница партнёров для компаний — чтобы проект жил без рекламы и платного доступа к знаниям."
      progress:
        title: "Сейчас в работе"
        items:
          - t: "Наполнение профессий"
            d: "Углубляем контент: больше уроков, разобранных примеров и проверяемых заданий."
          - t: "Схемы и иллюстрации к урокам"
            d: "Меняем плейсхолдеры на качественные схемы — половина пользы в наглядности."
      planned:
        title: "Запланировано"
        items:
          - t: "Публичный профиль"
            d: "Открытая страница с пройденными уроками и работами из дневника — портфолио для работодателя, публикуешь только то, что сам захочешь."
          - t: "Сдача практических проектов"
            d: "Загрузка результата (фото, схема, документ) с модерацией — настоящее портфолио для работодателя."
          - t: "Поиск по профессиям и урокам"
            d: "Быстро найти нужную тему или документ."
          - t: "Сообщество и свои направления, если ты специалист"
            d: "Опытные практики ведут карты своих профессий под своим именем — любых востребованных, от строителя до фермера. С обязательной модерацией: безопасность прежде всего."
          - t: "Страновые варианты допусков"
            d: "Документы для Казахстана и других стран — основа уже заложена (поле country_code)."
      future:
        title: "Идеи на будущее — по реальному запросу"
        items:
          - t: "Верифицируемые сертификаты"
            d: "Возможно платно — за результат, не за вход; бесплатная публичная проверка по QR. Только когда появится спрос и надежный механизм проверки реальных профессиональных навыков и выполненных практических заданий."
          - t: "Биржа специалистов"
            d: "Место, где опытные мастера и работодатели находят друг друга. Большой шаг — возьмёмся, когда вырастет сообщество практиков."
          - t: "Наставничество"
            d: "Чтобы мастер мог найти толкового новичка по его реальным работам и взять в подмастерье. Сильная вещь в духе ремесла, но требует зрелого сообщества и заботы о безопасности — поэтому по мере роста и запроса."
          - t: "Тесты для самопроверки"
            d: "Короткие квизы по уроку, чтобы закрепить материал."
          - t: "Больше профессий"
            d: "HVAC-техник, оператор ЧПУ, монтажник и другие — по запросу сообщества."
          - t: "Англоязычная версия"
            d: "Когда появится аудитория за пределами русскоязычного пространства и запрос на это."
      not_now:
        title: "Сознательно не делаем сейчас"
        items:
          - t: "Мобильное приложение"
            d: "Адаптивного сайта достаточно ещё надолго."
          - t: "Публичный API"
            d: "Нет реальных потребителей — добавим, когда появятся."
          - t: "Геймификация и стрики"
            d: "Удержанием занимаются, когда уже есть аудитория и контент."
          - t: "Визуальные графы-схемы пути"
            d: "Нужны понятные списки, а не блок-схемы."
          - t: "Комментарии и форум"
            d: "Сложная динамика и модерация в одиночку; обсуждение пока живёт в Telegram. Полноценный форум — позже и только если будет большой запрос и финансирование на модерацию и сервера."
    os_title: "Открытый проект"
    os_text: "IndustrialProfi — open source. Платформа, контент и прогресс бесплатны навсегда, а код открыт под лицензией AGPL-3.0. Все учебные материалы останутся открытыми — если когда-то появятся платные возможности, то только за дополнительные услуги вокруг обучения, никогда за доступ к знаниям."
    help_title: "Как помочь"
    help_text: "Предложи правку к уроку, поделись опытом мастера, расскажи коллегам, поддержи проект или просто напиши мне — я открыт к идеям и отзывам."
    cta_about: "О проекте"
    cta_support: "Поддержать проект"
    cta_telegram: "Написать в Telegram"

  support:
    page_title: "Поддержать проект — industrialprofi.com"
    title: "Поддержи проект"
    intro: "Учебные материалы IndustrialProfi бесплатны и открыты — и останутся такими навсегда. Я хочу, чтобы любой, кто решил освоить рабочую профессию, мог учиться по качественным материалам и не платить за это. Твоя поддержка помогает проекту жить и развиваться."
    donate_cta: "Поддержать проект"
    eyebrow: "Открытый проект"
    signal: "Проект в самом начале — и каждый донат это голос за то, что такие материалы нужны и должны жить. Поддержать сейчас особенно ценно: ты можешь быть одним из первых, кто решит, что у этого есть будущее."
    alive_html: 'Проект только начинается, но он живой и развивается у тебя на глазах — <a href="%{roadmap_url}">дорожная карта</a> и <a href="%{github_url}" target="_blank" rel="noopener">открытый исходный код</a>.'
    give_title: "Сколько и как"
    give_lead: "Любая сумма помогает, а суммы ниже — просто ориентир, не точная смета. Регулярная поддержка важнее всего: именно она даёт проекту опору, на которую можно рассчитывать."
    give:
      recurring_label: "Ежемесячно на Boosty — главная опора проекта"
      onetime_label: "Разово"
      r1: "первый шаг — каждый рубль в дело"
      r2: "ощутимая регулярная опора"
      r3: "двигает новые профессии вперёд"
      o1: "держит сервер пару дней"
      o2: "помогает добавить практический разбор"
      o3: "приближает новую тему со стандартами"
      o4: "капитальный вклад в развитие"
    give_note: "Регулярные уровни (Сторонник · Соратник · Опора) оформляются на Boosty. Разовая поддержка — через CloudTips: карты, СБП, любая сумма."
    vision_title: "К чему мы идём"
    vision_text: "Замысел больше, чем один сайт с уроками: открытая платформа-конструктор, где карты профессий пишут сами практики — сегодня электрик, сварщик, киповец, завтра любая сложная профессия, где решают руки и голова. Это требует времени, ресурсов и сообщества — и твоя поддержка приближает этот момент. Материалы при этом остаются бесплатными навсегда."
    transparency_title: "Честно про деньги"
    transparency_text: "Раз в квартал я буду открыто показывать, сколько пришло и на что ушло. Пожертвований пока нет — первый отчёт появится, как только будет о чём отчитываться. Открытость по деньгам — часть того, почему проект вообще открытый."
    company_title: "Вы компания или организация?"
    company_text: "Разовая поддержка через CloudTips ограничена 5000 ₽. Для компаний есть отдельный путь: поддержать проект существеннее или на постоянной основе и получить благодарность на странице партнёров."
    company_cta: "Партнёрство для компаний"
    faq_title: "Частые вопросы"

    q_how_money: "На что пойдут деньги?"
    a_how_money: "Деньги идут на серверы, домен и инфраструктуру, а главное — на новый контент: поиск, проверку и структурирование официальных стандартов и практических заданий. Это требует очень много времени, и каждый донат помогает находить это время, а не заниматься альтернативными проектами из-за отсутствия финансов."

    q_how_donate: "Как поддержать?"
    a_how_donate: "Поддержать можно через CloudTips — карты, СБП и другие способы оплаты. Разовый платёж или регулярная подписка — любая сумма помогает."

    q_why_free: "Почему проект бесплатный?"
    a_why_free: "Я убеждён: доступ к качественному обучению ремеслу не должен зависеть от толщины кошелька. Официальные стандарты — ГОСТ, ПУЭ, ПТЭЭП — публичны. Моя задача лишь собрать их в понятный путь, добавить практику и сделать обучение ясным. Это должно быть доступно каждому."

    q_paid: "Появятся ли платные функции?"
    a_paid: "Возможно: со временем у проекта могут появиться необязательные платные сервисы — например, маркетплейс специалистов или дополнительные инструменты, — чтобы он жил без рекламы и не зависел только от донатов. Но сами учебные материалы — тексты, стандарты, задания — были и останутся бесплатными и открытыми для всех. Платить за обучение по ним не придётся никогда."

    q_surplus: "А если пожертвований будет больше, чем нужно?"
    a_surplus: "Всё, что сверх необходимого, пойдёт на развитие: новые профессии, улучшение готовых материалов, систему отслеживания прогресса и мобильное приложение."

    q_other_help: "У меня нет возможности задонатить. Как ещё помочь?"
    a_other_help_html: 'Самый ценный вклад — не деньги, а знания. Если ты практик, предложи правку или возьмись вести целую профессию — всё это на <a href="%{contribute_url}">странице участия</a>. А ещё расскажи о проекте коллегам и поделись ссылкой в профильных чатах: так о нём узнают те, кому он нужен. Проект с открытым исходным кодом — разработчикам тоже рад.'

    q_who_created: "Кто стоит за IndustrialProfi?"
    a_who_created_html: 'Пока проект делаю я один — код, тексты, дизайн, поддержка людей в Telegram. Зачем и почему я за это взялся — подробно рассказал в <a href="%{about_url}">письме «О проекте»</a>. Есть идея, как сделать лучше или удобнее — пиши мне напрямую.'

    q_contact: "Как с тобой связаться?"
    a_contact_html: 'Напиши мне в <a href="%{telegram_url}" target="_blank" rel="noopener">Telegram</a>. Отвечаю в течение пары дней.'

  partners:
    title: "Партнёры проекта"
    intro: "IndustrialProfi развивается как открытый и независимый проект. Мы рады компаниям и организациям, которым близка идея доступного качественного обучения рабочим профессиям — и готовы к сотрудничеству."
    independence_title: "Принцип независимости"
    independence_text: "Поддержка — это признание и логотип, но не влияние на содержание. Рекомендации стандартов и инструментов всегда остаются честными и непредвзятыми, независимо от того, кто помогает проекту. Именно на этом стоит доверие, ради которого проект и существует."
    empty_invite: "Здесь будут компании и организации, благодаря которым проект живёт и растёт. Партнёров пока нет — ваша может стать первой."
