  support:
    page_title: "Поддержать проект — IndustrialProfi"
    title: "Поддержите проект"
    intro: "С самого начала IndustrialProfi стремится предоставить качественную и полностью бесплатную программу обучения для всех, кто хочет освоить промышленную профессию. Благодаря вашей поддержке мы можем продолжать помогать тысячам начинающих специалистов — независимо от их опыта или финансового положения."
    donate_cta: "Поддержать проект"
    faq_title: "Часто задаваемые вопросы"

    q_how_money: "На что пойдут деньги?"
    a_how_money: "Ваши средства пойдут на оплату серверов, домена и инфраструктуры проекта. Кроме того, деньги направляются на создание нового контента — поиск, проверку и структурирование официальных стандартов и практических заданий. Все наши расходы прозрачны."

    q_how_donate: "Как я могу пожертвовать?"
    a_how_donate: "Вы можете поддержать проект через CloudTips — принимаются банковские карты, СБП и другие способы оплаты. Разовое пожертвование или регулярная подписка — любая сумма помогает."

    q_why_free: "Почему проект бесплатный?"
    a_why_free: "Я убежден, что доступ к качественному обучению промышленным профессиям не должен зависеть от кошелька. Официальные стандарты — ГОСТ, ПУЭ, ПТЭЭП — это публичные документы. Наша задача — собрать их в логичном порядке, добавить практику и сделать обучение понятным. Это должно быть доступно каждому."

    q_surplus: "Что если пожертвований больше, чем нужно?"
    a_surplus: "Излишки направляются на развитие проекта: новые профессии, улучшение существующих материалов, разработка системы отслеживания прогресса и создание мобильной версии."

    q_other_help: "У меня нет возможности пожертвовать. Как ещё я могу помочь?"
    a_other_help: "Есть много способов! Расскажите о проекте коллегам и друзьям. Поделитесь ссылкой в профессиональных чатах и группах. Если вы эксперт в промышленной области — предложите материалы или проверьте существующие. Если вы разработчик — проект с открытым исходным кодом, и мы рады любым вкладам."

    q_who_created: "Кто стоит за IndustrialProfi?"
    a_who_created: "Пока что за проектом стою я один. Код, контент, дизайн, ответы в Telegram, разбор багов у конкретных людей — всё это часы после основной работы. Я верю, что промышленные специалисты заслуживают такой же качественной бесплатной программы обучения, какая есть у программистов. Пока я тяну всё сам, но цель — собрать сообщество экспертов, которые помогут проверять и дополнять материалы. Если хотите помочь или просто поговорить — пишите мне напрямую в Telegram."

    q_contact: "Как с вами связаться?"
    a_contact_html: 'Напишите мне в <a href="%{telegram_url}" target="_blank" rel="noopener">Telegram</a>. Я отвечаю в течение двух суток.'

