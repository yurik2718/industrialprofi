<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="IndustrialProfi — логотип: центральный узел, связанный с четырьмя узлами (сеть/связанные знания)">
  <rect x="6" y="6" width="500" height="500" rx="116" fill="#121212" stroke="#2a2a2a" stroke-width="3"/>
  <!-- links -->
  <g stroke="#ededed" stroke-width="16" stroke-linecap="round">
    <line x1="256" y1="256" x2="150" y2="150"/>
    <line x1="256" y1="256" x2="362" y2="150"/>
    <line x1="256" y1="256" x2="150" y2="362"/>
    <line x1="256" y1="256" x2="362" y2="362"/>
  </g>
  <!-- outer nodes -->
  <g fill="#121212" stroke="#ededed" stroke-width="16">
    <circle cx="150" cy="150" r="26"/>
    <circle cx="362" cy="150" r="26"/>
    <circle cx="150" cy="362" r="26"/>
    <circle cx="362" cy="362" r="26"/>
  </g>
  <!-- hub -->
  <circle cx="256" cy="256" r="42" fill="#3d9bff"/>
</svg>
