<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="IndustrialProfi — логотип: восходящий путь из трёх связанных узлов, верхний (цель) подсвечен">
  <rect x="6" y="6" width="500" height="500" rx="116" fill="#121212" stroke="#2a2a2a" stroke-width="3"/>
  <!-- connecting route -->
  <path d="M150 362 L256 256 L362 150" fill="none" stroke="#ededed" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- nodes -->
  <circle cx="150" cy="362" r="30" fill="#121212" stroke="#ededed" stroke-width="18"/>
  <circle cx="256" cy="256" r="30" fill="#121212" stroke="#ededed" stroke-width="18"/>
  <!-- goal node (highlight) -->
  <circle cx="362" cy="150" r="44" fill="#3d9bff"/>
</svg>
