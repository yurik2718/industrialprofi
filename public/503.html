<!doctype html>
<html lang="ru">

  <head>

    <title>Техническое обслуживание — IndustrialProfi</title>

    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1, width=device-width">
    <meta name="robots" content="noindex, nofollow">
    <meta name="color-scheme" content="dark">

    <style>

      *, *::before, *::after { box-sizing: border-box; }
      * { margin: 0; }

      html { font-size: 16px; }

      body {
        background: #000;
        color: #ededed;
        font-family: "Inter", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        line-height: 1.5;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 2rem;
      }

      main {
        width: min(100%, 34rem);
        text-align: center;
        display: grid;
        gap: 1rem;
        justify-items: center;
      }

      .brand {
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.02em;
        font-size: 0.95rem;
        color: #8a8a8a;
      }

      .icon {
        width: clamp(3.5rem, 14vw, 5rem);
        height: clamp(3.5rem, 14vw, 5rem);
        color: #2e2e2e;
      }

      h1 {
        font-weight: 700;
        font-size: clamp(1.4rem, 5vw, 1.9rem);
        letter-spacing: -0.01em;
      }

      .lead {
        color: #a5a5a5;
        font-size: 1rem;
      }

    </style>

  </head>

  <body>

    <!-- public/503.html — served by kamal-proxy during `kamal app maintenance` (and any 503). -->
    <!-- Filename MUST stay the HTTP code: Kamal uploads only {4??,5??}.html error pages. -->

    <main>
      <p class="brand">IndustrialProfi</p>
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
      </svg>
      <h1>Сайт на техническом обслуживании</h1>
      <p class="lead">Мы ненадолго закрылись на обновление и скоро вернёмся. Все материалы и ваш прогресс на месте — загляните чуть позже.</p>
    </main>

  </body>

</html>
