<!doctype html>
<html lang="ru">

  <head>

    <title>Страница не найдена (404) — IndustrialProfi</title>

    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1, width=device-width">
    <meta name="robots" content="noindex, nofollow">
    <meta name="color-scheme" content="dark">

    <style>

      *, *::before, *::after { box-sizing: border-box; }
      * { margin: 0; }

      html { font-size: 16px; }

      body {
        background: #000;
        color: #ededed;
        font-family: "Inter", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        line-height: 1.5;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 2rem;
      }

      main {
        width: min(100%, 34rem);
        text-align: center;
        display: grid;
        gap: 1rem;
        justify-items: center;
      }

      .brand {
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.02em;
        font-size: 0.95rem;
        color: #8a8a8a;
      }

      .code {
        font-weight: 800;
        font-size: clamp(4rem, 18vw, 7rem);
        line-height: 1;
        letter-spacing: -0.03em;
        color: #2e2e2e;
      }

      h1 {
        font-weight: 700;
        font-size: clamp(1.4rem, 5vw, 1.9rem);
        letter-spacing: -0.01em;
      }

      .lead {
        color: #a5a5a5;
        font-size: 1rem;
      }

      .btn {
        display: inline-block;
        margin-top: 0.5rem;
        padding: 0.7rem 1.4rem;
        border-radius: 0.5rem;
        background: #ededed;
        color: #000;
        font-weight: 600;
        text-decoration: none;
      }

      .btn:hover { background: #fff; }

    </style>

  </head>

  <body>

    <!-- This file lives in public/404.html -->

    <main>
      <p class="brand">IndustrialProfi</p>
      <p class="code">404</p>
      <h1>Страница не найдена</h1>
      <p class="lead">Возможно, адрес набран с опечаткой или страница переехала. Вернитесь на главную и продолжите с того места, где остановились.</p>
      <a class="btn" href="/">На главную</a>
    </main>

  </body>

</html>
