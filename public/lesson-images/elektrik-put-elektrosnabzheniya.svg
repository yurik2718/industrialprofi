<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 560" role="img" aria-label="Путь электроснабжения: ТП 10/0,4 кВ, ВРУ здания, стояк, этажный щит, квартирный щит, потребители — с указанием напряжений">
  <style>
    text{font-family:Inter,system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;fill:#ededed}
    .box{fill:#161616;stroke:#2e2e2e;stroke-width:1.5}
    .hl{fill:#11161c;stroke:#3d9bff;stroke-width:1.75}
    .edge{stroke:#7d7d7d;stroke-width:1.75;fill:none}
    .ttl{font-size:14px;font-weight:700}
    .sub{fill:#a1a1a1;font-size:11px}
    .volt{fill:#3d9bff;font-size:12px;font-weight:600}
  </style>
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#7d7d7d"/></marker>
  </defs>

  <!-- 1. ТП -->
  <rect class="hl" x="230" y="20" width="300" height="56" rx="10"/>
  <text class="ttl" x="380" y="44" text-anchor="middle">Трансформаторная подстанция (ТП)</text>
  <text class="sub" x="380" y="63" text-anchor="middle">понижает 10 кВ → 0,4 кВ</text>

  <path class="edge" d="M380 76 V112" marker-end="url(#ah)"/>
  <text class="volt" x="396" y="98" text-anchor="start">10 / 0,4 кВ</text>

  <!-- 2. ВРУ -->
  <rect class="box" x="230" y="114" width="300" height="56" rx="10"/>
  <text class="ttl" x="380" y="138" text-anchor="middle">ВРУ здания</text>
  <text class="sub" x="380" y="157" text-anchor="middle">вводно-распределительное устройство · узел учёта</text>

  <path class="edge" d="M380 170 V206" marker-end="url(#ah)"/>
  <text class="volt" x="396" y="192" text-anchor="start">380 / 220 В</text>

  <!-- 3. Стояк -->
  <rect class="box" x="230" y="208" width="300" height="56" rx="10"/>
  <text class="ttl" x="380" y="232" text-anchor="middle">Стояк</text>
  <text class="sub" x="380" y="251" text-anchor="middle">вертикальная магистраль по этажам</text>

  <path class="edge" d="M380 264 V300" marker-end="url(#ah)"/>
  <text class="volt" x="396" y="286" text-anchor="start">380 / 220 В</text>

  <!-- 4. Этажный щит -->
  <rect class="box" x="230" y="302" width="300" height="56" rx="10"/>
  <text class="ttl" x="380" y="326" text-anchor="middle">Этажный щит</text>
  <text class="sub" x="380" y="345" text-anchor="middle">распределение по квартирам этажа</text>

  <path class="edge" d="M380 358 V394" marker-end="url(#ah)"/>
  <text class="volt" x="396" y="380" text-anchor="start">220 В</text>

  <!-- 5. Квартирный щит -->
  <rect class="box" x="230" y="396" width="300" height="56" rx="10"/>
  <text class="ttl" x="380" y="420" text-anchor="middle">Квартирный щит</text>
  <text class="sub" x="380" y="439" text-anchor="middle">автоматы, УЗО, групповые линии</text>

  <path class="edge" d="M380 452 V488" marker-end="url(#ah)"/>
  <text class="volt" x="396" y="474" text-anchor="start">220 В</text>

  <!-- 6. Потребители -->
  <rect class="box" x="230" y="490" width="300" height="56" rx="10"/>
  <text class="ttl" x="380" y="514" text-anchor="middle">Потребители</text>
  <text class="sub" x="380" y="533" text-anchor="middle">розетки и светильники</text>
</svg>
