<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 400" role="img" aria-label="Горячий резерв ПЛК: основной ПЛК (active) и резервный (standby) соединены линией синхронизации, оба подключены к общей сети и к процессу; при отказе основного резервный за миллисекунды берёт управление">
  <style>
    text{font-family:Inter,system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;fill:#ededed}
    .box{fill:#161616;stroke:#2e2e2e;stroke-width:1.5}
    .dec{fill:#11161c;stroke:#3d9bff;stroke-width:1.75}
    .edge{stroke:#7d7d7d;stroke-width:1.75;fill:none}
    .sync{stroke:#3d9bff;stroke-width:1.75;fill:none;stroke-dasharray:6 4}
    .takeover{stroke:#3d9bff;stroke-width:1.75;fill:none}
    .ttl{font-size:14px;font-weight:700}
    .sub{fill:#a1a1a1;font-size:11px}
    .acc{fill:#3d9bff;font-size:11px;font-weight:700}
    .lbl{font-size:12px;font-weight:600}
  </style>
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#7d7d7d"/></marker>
    <marker id="ahb" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#3d9bff"/></marker>
  </defs>

  <text class="ttl" x="20" y="26">Горячий резерв ПЛК (hot standby)</text>

  <!-- network bus -->
  <rect class="box" x="60" y="56" width="700" height="34" rx="8"/>
  <text class="lbl" x="410" y="78" text-anchor="middle">Сеть АРМ / SCADA</text>

  <!-- main PLC (active) -->
  <rect class="dec" x="100" y="140" width="230" height="92" rx="10"/>
  <text class="ttl" x="215" y="170" text-anchor="middle">ПЛК основной</text>
  <text class="acc" x="215" y="192" text-anchor="middle">ACTIVE — управляет</text>
  <text class="sub" x="215" y="214" text-anchor="middle">читает входы, ведёт программу</text>

  <!-- standby PLC -->
  <rect class="box" x="490" y="140" width="230" height="92" rx="10"/>
  <text class="ttl" x="605" y="170" text-anchor="middle">ПЛК резервный</text>
  <text class="sub" x="605" y="192" text-anchor="middle">STANDBY — ждёт</text>
  <text class="sub" x="605" y="214" text-anchor="middle">синхронно повторяет состояние</text>

  <!-- network drops -->
  <path class="edge" d="M215 90 V140" marker-end="url(#ah)"/>
  <path class="edge" d="M605 90 V140" marker-end="url(#ah)"/>

  <!-- sync line -->
  <path class="sync" d="M330 186 H490"/>
  <text class="acc" x="410" y="178" text-anchor="middle">линия синхронизации</text>
  <text class="sub" x="410" y="206" text-anchor="middle">непрерывно копирует состояние</text>

  <!-- takeover arrow -->
  <path class="takeover" d="M490 222 C440 252 380 252 330 222" marker-end="url(#ahb)"/>
  <text class="acc" x="410" y="262" text-anchor="middle">при отказе основного — за миллисекунды</text>
  <text class="acc" x="410" y="278" text-anchor="middle">резервный берёт управление</text>

  <!-- process -->
  <rect class="box" x="280" y="312" width="260" height="56" rx="10"/>
  <text class="ttl" x="410" y="338" text-anchor="middle">Процесс</text>
  <text class="sub" x="410" y="356" text-anchor="middle">датчики · ИМ · клапаны</text>

  <!-- PLC to process (active drives) -->
  <path class="takeover" d="M215 232 V340 H280" marker-end="url(#ahb)"/>
  <path class="edge" d="M605 232 V340 H540"/>
  <text class="sub" x="210" y="300" text-anchor="middle">управление</text>
</svg>
