<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 540" role="img" aria-label="Чертёж общего вида шкафа автоматизации: сверху вводной автомат и блок питания 24 В, в центре ПЛК с модулями ввода-вывода, справа клеммники, снизу кабельные каналы и шина заземления; силовая часть разнесена от слаботочной.">
  <style>
    text{font-family:Inter,system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;fill:#ededed}
    .box{fill:#161616;stroke:#2e2e2e;stroke-width:1.5}
    .dec{fill:#11161c;stroke:#3d9bff;stroke-width:1.75}
    .ok{fill:#102019;stroke:#34c759;stroke-width:1.75}
    .danger{fill:#241110;stroke:#f25a4e;stroke-width:1.75}
    .edge{stroke:#7d7d7d;stroke-width:1.75;fill:none}
    .ttl{font-size:14px;font-weight:700}
    .lbl{font-size:12px;font-weight:600}
    .sub{fill:#a1a1a1;font-size:11px}
    .zlbl{fill:#3d9bff;font-size:11px;font-weight:700}
    .din{stroke:#2e2e2e;stroke-width:1.5;fill:none}
  </style>
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#7d7d7d"/></marker>
  </defs>

  <!-- Cabinet enclosure (open door front view) -->
  <rect class="box" x="170" y="20" width="430" height="500" rx="10"/>
  <text class="ttl" x="385" y="44" text-anchor="middle">Шкаф автоматизации — вид спереди</text>

  <!-- ===== Zone 1: Power input (top) ===== -->
  <rect class="dec" x="190" y="60" width="390" height="78" rx="8"/>
  <text class="zlbl" x="200" y="76">ВВОД ПИТАНИЯ 220 В</text>
  <rect class="box" x="206" y="84" width="80" height="42" rx="6"/>
  <text class="lbl" x="246" y="102" text-anchor="middle">QF1</text>
  <text class="sub" x="246" y="118" text-anchor="middle">вводной</text>
  <rect class="box" x="300" y="84" width="80" height="42" rx="6"/>
  <text class="lbl" x="340" y="102" text-anchor="middle">QF2</text>
  <text class="sub" x="340" y="118" text-anchor="middle">автоматы</text>
  <rect class="box" x="430" y="84" width="130" height="42" rx="6"/>
  <text class="lbl" x="495" y="102" text-anchor="middle">Блок питания 24 В=</text>
  <text class="sub" x="495" y="118" text-anchor="middle">220 В → 24 В пост.</text>

  <!-- ===== Zone 2: PLC (centre) ===== -->
  <rect class="box" x="190" y="158" width="280" height="118" rx="8"/>
  <text class="zlbl" x="200" y="174">КОНТРОЛЛЕР</text>
  <rect class="box" x="206" y="186" width="64" height="74" rx="6"/>
  <text class="lbl" x="238" y="220" text-anchor="middle">ПЛК</text>
  <text class="sub" x="238" y="236" text-anchor="middle">ЦП</text>
  <rect class="box" x="278" y="186" width="44" height="74" rx="6"/>
  <text class="lbl" x="300" y="218" text-anchor="middle">DI</text>
  <text class="sub" x="300" y="234" text-anchor="middle">DO</text>
  <rect class="box" x="330" y="186" width="44" height="74" rx="6"/>
  <text class="lbl" x="352" y="218" text-anchor="middle">AI</text>
  <text class="sub" x="352" y="234" text-anchor="middle">AO</text>
  <rect class="box" x="382" y="186" width="72" height="74" rx="6"/>
  <text class="lbl" x="418" y="218" text-anchor="middle">Модули</text>
  <text class="sub" x="418" y="234" text-anchor="middle">в/в</text>

  <!-- ===== Zone 3: Terminals (right side) ===== -->
  <rect class="ok" x="486" y="158" width="94" height="252" rx="8"/>
  <text class="zlbl" x="496" y="174" style="fill:#34c759">КЛЕММЫ</text>
  <line class="din" x1="496" y1="190" x2="570" y2="190"/>
  <line class="din" x1="496" y1="210" x2="570" y2="210"/>
  <line class="din" x1="496" y1="230" x2="570" y2="230"/>
  <line class="din" x1="496" y1="250" x2="570" y2="250"/>
  <line class="din" x1="496" y1="270" x2="570" y2="270"/>
  <line class="din" x1="496" y1="290" x2="570" y2="290"/>
  <line class="din" x1="496" y1="310" x2="570" y2="310"/>
  <line class="din" x1="496" y1="330" x2="570" y2="330"/>
  <line class="din" x1="496" y1="350" x2="570" y2="350"/>
  <line class="din" x1="496" y1="370" x2="570" y2="370"/>
  <text class="sub" x="533" y="394" text-anchor="middle">ряды с</text>
  <text class="sub" x="533" y="406" text-anchor="middle">маркировкой</text>

  <!-- separation note between power (top) and signal (bottom) -->
  <text class="sub" x="200" y="296">слаботочка 24 В / 4–20 мА / RS-485</text>
  <line x1="190" y1="304" x2="470" y2="304" stroke="#3d9bff" stroke-width="1.25" stroke-dasharray="5 4"/>

  <!-- ===== Cable ducts (bottom) ===== -->
  <rect class="box" x="190" y="316" width="280" height="94" rx="8"/>
  <text class="zlbl" x="200" y="332">КАБЕЛЬНЫЕ КАНАЛЫ</text>
  <line class="edge" x1="206" y1="350" x2="454" y2="350"/>
  <line class="edge" x1="206" y1="372" x2="454" y2="372"/>
  <text class="sub" x="200" y="366">закрытые, с запасом места</text>
  <text class="sub" x="200" y="394">силовые и сигнальные — раздельными трассами</text>

  <!-- ===== Ground bus (bottom) ===== -->
  <rect class="box" x="190" y="426" width="390" height="74" rx="8"/>
  <text class="zlbl" x="200" y="444">ЗАЗЕМЛЕНИЕ — ШИНА PE</text>
  <rect class="box" x="206" y="454" width="368" height="20" rx="4"/>
  <!-- PE symbol -->
  <line x1="300" y1="486" x2="300" y2="496" stroke="#ededed" stroke-width="2"/>
  <line x1="288" y1="486" x2="312" y2="486" stroke="#ededed" stroke-width="2"/>
  <line x1="291" y1="491" x2="309" y2="491" stroke="#ededed" stroke-width="2"/>
  <line x1="294" y1="496" x2="306" y2="496" stroke="#ededed" stroke-width="2"/>
  <text class="sub" x="385" y="492" text-anchor="middle">корпус · двери · DIN-рейки · экраны кабелей</text>

  <!-- ===== Callouts / выноски (right) ===== -->
  <path class="edge" d="M610 99 H660" marker-start="url(#ah)"/>
  <text class="lbl" x="664" y="96">Питание</text>
  <text class="sub" x="664" y="110">сверху, отдельно</text>

  <path class="edge" d="M470 217 H525 M610 217 H660" marker-start="url(#ah)"/>
  <text class="lbl" x="664" y="214">Контроллер</text>
  <text class="sub" x="664" y="228">центр, доступ</text>

  <path class="edge" d="M610 280 H660" marker-start="url(#ah)"/>
  <text class="lbl" x="664" y="277">Клеммы</text>
  <text class="sub" x="664" y="291">полевые кабели</text>

  <path class="edge" d="M610 463 H660" marker-start="url(#ah)"/>
  <text class="lbl" x="664" y="460">Заземление</text>
  <text class="sub" x="664" y="474">общая шина PE</text>

  <!-- separation legend (left) -->
  <text class="sub" x="20" y="100" style="fill:#f25a4e">Силовая</text>
  <text class="sub" x="20" y="114" style="fill:#f25a4e">220/380 В</text>
  <path class="edge" d="M155 105 H188" marker-end="url(#ah)" stroke="#f25a4e"/>

  <text class="sub" x="20" y="300" style="fill:#3d9bff">Слаботочка</text>
  <text class="sub" x="20" y="314" style="fill:#3d9bff">сигналы</text>
  <path class="edge" d="M155 305 H188" marker-end="url(#ah)" stroke="#3d9bff"/>

  <text class="sub" x="20" y="170">Силовое и слаботочное</text>
  <text class="sub" x="20" y="184">разнесены по высоте,</text>
  <text class="sub" x="20" y="198">трассы перпендикулярны</text>
</svg>
