<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 470" role="img" aria-label="Круговая диаграмма цикла сканирования ПЛК: чтение входов, выполнение программы, запись выходов, повтор">
  <style>
    text{font-family:Inter,system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;fill:#ededed}
    .box{fill:#161616;stroke:#2e2e2e;stroke-width:1.5}
    .dec{fill:#11161c;stroke:#3d9bff;stroke-width:1.75}
    .edge{stroke:#7d7d7d;stroke-width:1.75;fill:none}
    .arc{stroke:#3d9bff;stroke-width:2.5;fill:none}
    .ttl{font-size:14px;font-weight:700}
    .num{font-size:15px;font-weight:700;fill:#3d9bff}
    .sub{fill:#a1a1a1;font-size:11px}
    .ctr{font-size:12px;font-weight:700}
  </style>
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#3d9bff"/></marker>
  </defs>

  <!-- center hub -->
  <circle cx="310" cy="235" r="62" class="box"/>
  <text class="ctr" x="310" y="225" text-anchor="middle">Время цикла</text>
  <text class="num" x="310" y="247" text-anchor="middle">~1&#8211;10 мс</text>
  <text class="sub" x="310" y="266" text-anchor="middle">и снова по кругу</text>

  <!-- Step 1: top -->
  <rect class="dec" x="200" y="20" width="220" height="62" rx="10"/>
  <text class="num" x="216" y="46" text-anchor="middle">1</text>
  <text class="ttl" x="320" y="44" text-anchor="middle">Чтение входов</text>
  <text class="sub" x="320" y="63" text-anchor="middle">опросить все датчики,</text>
  <text class="sub" x="320" y="76" text-anchor="middle">зафиксировать состояние</text>

  <!-- Step 2: bottom-right -->
  <rect class="dec" x="380" y="370" width="220" height="62" rx="10"/>
  <text class="num" x="396" y="396" text-anchor="middle">2</text>
  <text class="ttl" x="500" y="394" text-anchor="middle">Выполнение программы</text>
  <text class="sub" x="500" y="413" text-anchor="middle">прогнать логику</text>
  <text class="sub" x="500" y="426" text-anchor="middle">пользователя на снимке</text>

  <!-- Step 3: bottom-left -->
  <rect class="dec" x="20" y="370" width="220" height="62" rx="10"/>
  <text class="num" x="36" y="396" text-anchor="middle">3</text>
  <text class="ttl" x="140" y="394" text-anchor="middle">Запись выходов</text>
  <text class="sub" x="140" y="413" text-anchor="middle">команды на</text>
  <text class="sub" x="140" y="426" text-anchor="middle">исполнительные механизмы</text>

  <!-- circular arrows clockwise: 1 -> 2 -> 3 -> 1 -->
  <!-- arc from step1 (right side) down to step2 (top) -->
  <path class="arc" d="M428 70 A 230 230 0 0 1 506 366" marker-end="url(#ah)"/>
  <!-- arc from step2 (left) across to step3 (right) -->
  <path class="arc" d="M376 401 A 120 60 0 0 1 244 401" marker-end="url(#ah)"/>
  <!-- arc from step3 (top) up to step1 (left) -->
  <path class="arc" d="M114 366 A 230 230 0 0 1 192 70" marker-end="url(#ah)"/>
</svg>
