<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 300" role="img" aria-label="Путь сигнала в АСУ ТП: датчик температуры 4-20 мА на вход ПЛК, алгоритм ST/FBD, аналоговый выход на регулирующий клапан и частотник, и параллельно вывод на АРМ SCADA">
  <style>
    text{font-family:Inter,system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;fill:#ededed}
    .box{fill:#161616;stroke:#2e2e2e;stroke-width:1.5}
    .dec{fill:#11161c;stroke:#3d9bff;stroke-width:1.75}
    .edge{stroke:#7d7d7d;stroke-width:1.75;fill:none}
    .sig{stroke:#3d9bff;stroke-width:1.75;fill:none}
    .ttl{font-size:14px;font-weight:700}
    .sub{fill:#a1a1a1;font-size:11px}
    .lbl{fill:#3d9bff;font-size:10.5px;font-weight:600}
  </style>
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#7d7d7d"/></marker>
    <marker id="ahb" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#3d9bff"/></marker>
  </defs>

  <!-- Датчик -->
  <rect class="box" x="16" y="116" width="140" height="68" rx="10"/>
  <text class="ttl" x="86" y="142" text-anchor="middle">Датчик</text>
  <text class="sub" x="86" y="160" text-anchor="middle">температуры</text>
  <text class="sub" x="86" y="174" text-anchor="middle">физическая величина</text>

  <!-- 4-20 мА сигнал -->
  <path class="sig" d="M156 150 H236" marker-end="url(#ahb)"/>
  <text class="lbl" x="196" y="142" text-anchor="middle">4–20 мА</text>

  <!-- ПЛК (контейнер) -->
  <rect class="dec" x="236" y="80" width="248" height="140" rx="12"/>
  <text class="ttl" x="360" y="102" text-anchor="middle">ПЛК (контроллер)</text>

  <!-- Аналоговый вход -->
  <rect class="box" x="252" y="116" width="92" height="44" rx="8"/>
  <text class="sub" x="298" y="134" text-anchor="middle">аналог.</text>
  <text class="sub" x="298" y="148" text-anchor="middle">вход AI</text>

  <!-- Алгоритм -->
  <rect class="box" x="372" y="116" width="96" height="44" rx="8"/>
  <text class="sub" x="420" y="134" text-anchor="middle">алгоритм</text>
  <text class="sub" x="420" y="148" text-anchor="middle">ST / FBD</text>

  <!-- AI -> алгоритм -->
  <path class="edge" d="M344 138 H372" marker-end="url(#ah)"/>

  <!-- Аналоговый выход -->
  <rect class="box" x="318" y="172" width="132" height="40" rx="8"/>
  <text class="sub" x="384" y="197" text-anchor="middle">аналоговый выход AO</text>
  <path class="edge" d="M420 160 V172" marker-end="url(#ah)"/>

  <!-- AO -> механизм -->
  <path class="sig" d="M450 192 H560" marker-end="url(#ahb)"/>
  <text class="lbl" x="505" y="184" text-anchor="middle">4–20 мА</text>

  <!-- Исполнительный механизм -->
  <rect class="box" x="560" y="120" width="170" height="44" rx="8"/>
  <text class="ttl" x="645" y="146" text-anchor="middle">Регулирующий клапан</text>
  <rect class="box" x="560" y="174" width="170" height="40" rx="8"/>
  <text class="ttl" x="645" y="199" text-anchor="middle">Частотник (ЧРП)</text>
  <text class="sub" x="730" y="232" text-anchor="end">исполнительный механизм</text>

  <!-- объект -->
  <text class="sub" x="645" y="100" text-anchor="middle">действие на процесс</text>
  <path class="edge" d="M645 120 V108" marker-end="url(#ah)"/>

  <!-- АРМ SCADA сверху -->
  <rect class="box" x="252" y="16" width="216" height="44" rx="8"/>
  <text class="ttl" x="360" y="38" text-anchor="middle">АРМ SCADA</text>
  <text class="sub" x="360" y="53" text-anchor="middle">мнемосхема для оператора</text>

  <!-- ПЛК -> SCADA -->
  <path class="sig" d="M360 80 V60" marker-end="url(#ahb)"/>
  <text class="lbl" x="372" y="74" text-anchor="start">данные</text>
</svg>
