<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" role="img" aria-label="Карьерная лестница инженера АСУ ТП: от инженера-новичка через категории и ведущего инженера до главного специалиста и ГИПа, с подписями о добавляемых опыте, аттестациях и внесении в Национальный реестр специалистов.">
  <style>
    text{font-family:Inter,system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;fill:#ededed}
    .box{fill:#161616;stroke:#2e2e2e;stroke-width:1.5}
    .top{fill:#11161c;stroke:#3d9bff;stroke-width:1.75}
    .edge{stroke:#7d7d7d;stroke-width:1.75;fill:none}
    .ttl{font-size:13px;font-weight:700}
    .sub{fill:#a1a1a1;font-size:11px}
    .lvl{fill:#3d9bff;font-size:10px;font-weight:700}
    .note{fill:#a1a1a1;font-size:10.5px}
    .arrow{stroke:#3d9bff;stroke-width:2;fill:none}
  </style>
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#3d9bff"/></marker>
  </defs>

  <!-- rising arrow on the left -->
  <path class="arrow" d="M28 396 L28 30" marker-end="url(#ah)"/>
  <text class="lvl" x="44" y="30" transform="rotate(-90 44 30)" text-anchor="end">рост квалификации и ответственности</text>

  <!-- step 5: GIP (top) -->
  <rect class="top" x="64" y="20" width="300" height="56" rx="10"/>
  <text class="ttl" x="214" y="44" text-anchor="middle">ГИП</text>
  <text class="sub" x="214" y="62" text-anchor="middle">главный инженер проекта</text>

  <!-- step 4 -->
  <rect class="box" x="64" y="96" width="300" height="56" rx="10"/>
  <text class="ttl" x="214" y="120" text-anchor="middle">Главный специалист /</text>
  <text class="ttl" x="214" y="137" text-anchor="middle">руководитель группы</text>

  <!-- step 3 -->
  <rect class="box" x="64" y="172" width="300" height="56" rx="10"/>
  <text class="ttl" x="214" y="204" text-anchor="middle">Ведущий инженер</text>

  <!-- step 2 -->
  <rect class="box" x="64" y="248" width="300" height="56" rx="10"/>
  <text class="ttl" x="214" y="280" text-anchor="middle">Инженер II / I категории</text>

  <!-- step 1 (bottom) -->
  <rect class="box" x="64" y="324" width="300" height="56" rx="10"/>
  <text class="ttl" x="214" y="348" text-anchor="middle">Инженер (junior)</text>
  <text class="sub" x="214" y="366" text-anchor="middle">старт карьеры</text>

  <!-- vertical connectors between steps -->
  <path class="edge" d="M214 96 V76"/>
  <path class="edge" d="M214 172 V152"/>
  <path class="edge" d="M214 248 V228"/>
  <path class="edge" d="M214 324 V304"/>

  <!-- side notes: what is added at each step -->
  <path class="edge" d="M364 352 H424"/>
  <text class="note" x="432" y="349">+ базовое высшее образование</text>
  <text class="note" x="432" y="365">+ группа по электробезопасности III</text>

  <path class="edge" d="M364 276 H424"/>
  <text class="note" x="432" y="273">+ опыт 3–5 лет, группа IV</text>
  <text class="note" x="432" y="289">+ аттестация Ростехнадзора (ОПО)</text>

  <path class="edge" d="M364 200 H424"/>
  <text class="note" x="432" y="197">+ самостоятельные разделы проекта</text>
  <text class="note" x="432" y="213">+ профстандарт: уровень 6</text>

  <path class="edge" d="M364 124 H424"/>
  <text class="note" x="432" y="121">+ руководство группой, проект в целом</text>
  <text class="note" x="432" y="137">+ внесение в НРС НОПРИЗ</text>

  <path class="edge" d="M364 48 H424"/>
  <text class="note" x="432" y="45">+ ответственность за весь проект</text>
  <text class="note" x="432" y="61">+ профстандарт: уровень 7</text>
</svg>
