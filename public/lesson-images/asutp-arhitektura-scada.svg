<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" role="img" aria-label="Архитектура SCADA: два ПЛК с датчиками и механизмами снизу, по сети Modbus TCP / OPC UA к SCADA-серверу, от него к двум АРМ оператора. Данные идут вверх, команды и уставки вниз.">
  <style>
    text{font-family:Inter,system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;fill:#ededed}
    .box{fill:#161616;stroke:#2e2e2e;stroke-width:1.5}
    .dec{fill:#11161c;stroke:#3d9bff;stroke-width:1.75}
    .edge{stroke:#7d7d7d;stroke-width:1.75;fill:none}
    .ttl{font-size:14px;font-weight:700}
    .sub{fill:#a1a1a1;font-size:11px}
    .lbl{fill:#a1a1a1;font-size:10.5px}
    .net{fill:#3d9bff;font-size:11px;font-weight:600}
    .sigup{stroke:#3d9bff;stroke-width:1.75;fill:none}
  </style>
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#7d7d7d"/></marker>
    <marker id="ahb" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#3d9bff"/></marker>
  </defs>

  <!-- Top: АРМ operators -->
  <rect class="box" x="150" y="18" width="200" height="58" rx="10"/>
  <text class="ttl" x="250" y="42" text-anchor="middle">АРМ оператора 1</text>
  <text class="sub" x="250" y="60" text-anchor="middle">экран — мнемосхема</text>

  <rect class="box" x="400" y="18" width="200" height="58" rx="10"/>
  <text class="ttl" x="500" y="42" text-anchor="middle">АРМ оператора 2</text>
  <text class="sub" x="500" y="60" text-anchor="middle">экран — мнемосхема</text>
  <text class="lbl" x="375" y="94" text-anchor="middle">АРМ показывают</text>

  <!-- links server <-> ARM -->
  <path class="edge" d="M250 136 V76" marker-end="url(#ah)"/>
  <path class="edge" d="M500 136 V76" marker-end="url(#ah)"/>

  <!-- SCADA server -->
  <rect class="dec" x="225" y="136" width="300" height="66" rx="10"/>
  <text class="ttl" x="375" y="162" text-anchor="middle">SCADA-сервер</text>
  <text class="sub" x="375" y="182" text-anchor="middle">опрос ПЛК · архив · БД · тренды · алармы</text>
  <text class="lbl" x="375" y="198" text-anchor="middle">сервер собирает</text>

  <!-- network label between server and PLC -->
  <text class="net" x="375" y="234" text-anchor="middle">сеть — Modbus TCP / OPC UA</text>

  <!-- server to PLC links -->
  <path class="edge" d="M300 202 V298" marker-end="url(#ah)"/>
  <path class="edge" d="M450 202 V298" marker-end="url(#ah)"/>

  <!-- PLC 1 -->
  <rect class="box" x="180" y="298" width="240" height="58" rx="10"/>
  <text class="ttl" x="300" y="322" text-anchor="middle">ПЛК 1</text>
  <text class="sub" x="300" y="340" text-anchor="middle">регистры · AI/AO/DI/DO</text>

  <!-- PLC 2 -->
  <rect class="box" x="330" y="298" width="240" height="58" rx="10"/>
  <text class="ttl" x="450" y="322" text-anchor="middle">ПЛК 2</text>
  <text class="sub" x="450" y="340" text-anchor="middle">регистры · AI/AO/DI/DO</text>

  <!-- field devices PLC1 -->
  <path class="edge" d="M240 356 V408" marker-end="url(#ah)"/>
  <path class="edge" d="M360 356 V408" marker-end="url(#ah)"/>
  <rect class="box" x="180" y="408" width="116" height="48" rx="8"/>
  <text class="sub" x="238" y="430" text-anchor="middle" font-weight="600" fill="#ededed">Датчик</text>
  <text class="lbl" x="238" y="446" text-anchor="middle">4–20 мА</text>
  <rect class="box" x="304" y="408" width="116" height="48" rx="8"/>
  <text class="sub" x="362" y="430" text-anchor="middle" font-weight="600" fill="#ededed">ИМ / клапан</text>
  <text class="lbl" x="362" y="446" text-anchor="middle">механизм</text>

  <!-- field devices PLC2 -->
  <path class="edge" d="M400 356 V408" marker-end="url(#ah)"/>
  <path class="edge" d="M520 356 V408" marker-end="url(#ah)"/>
  <rect class="box" x="330" y="408" width="116" height="48" rx="8"/>
  <text class="sub" x="388" y="430" text-anchor="middle" font-weight="600" fill="#ededed">Датчик</text>
  <text class="lbl" x="388" y="446" text-anchor="middle">4–20 мА</text>
  <rect class="box" x="454" y="408" width="116" height="48" rx="8"/>
  <text class="sub" x="512" y="430" text-anchor="middle" font-weight="600" fill="#ededed">ИМ / клапан</text>
  <text class="lbl" x="512" y="446" text-anchor="middle">механизм</text>

  <!-- side: data up / commands down -->
  <path class="sigup" d="M660 412 V58" marker-end="url(#ahb)"/>
  <text class="net" x="660" y="44" text-anchor="middle">данные ↑</text>
  <path class="edge" d="M745 58 V412" marker-end="url(#ah)"/>
  <text class="lbl" x="745" y="438" text-anchor="middle">команды,</text>
  <text class="lbl" x="745" y="452" text-anchor="middle">уставки ↓</text>
</svg>
