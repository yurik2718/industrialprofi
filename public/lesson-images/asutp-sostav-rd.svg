<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 470" role="img" aria-label="Схема-дерево состава рабочей документации раздела автоматизации (АТХ): корень и семь ветвей с назначением каждого документа">
  <style>
    text{font-family:Inter,system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;fill:#ededed}
    .box{fill:#161616;stroke:#2e2e2e;stroke-width:1.5}
    .root{fill:#11161c;stroke:#3d9bff;stroke-width:1.75}
    .edge{stroke:#7d7d7d;stroke-width:1.75;fill:none}
    .ttl{font-size:14px;font-weight:700}
    .sub{fill:#a1a1a1;font-size:11px}
    .rt{font-size:15px;font-weight:700}
  </style>
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#7d7d7d"/></marker>
  </defs>

  <!-- root -->
  <rect class="root" x="330" y="16" width="200" height="54" rx="10"/>
  <text class="rt" x="430" y="40" text-anchor="middle">Раздел АТХ</text>
  <text class="sub" x="430" y="58" text-anchor="middle">ГОСТ 21.408-2013</text>

  <!-- bus line under root -->
  <path class="edge" d="M430 70 V92" marker-end="url(#ah)"/>
  <path class="edge" d="M70 92 H790"/>

  <!-- branch drops -->
  <path class="edge" d="M120 92 V112" marker-end="url(#ah)"/>
  <path class="edge" d="M275 92 V112" marker-end="url(#ah)"/>
  <path class="edge" d="M430 92 V112" marker-end="url(#ah)"/>
  <path class="edge" d="M585 92 V112" marker-end="url(#ah)"/>
  <path class="edge" d="M740 92 V112" marker-end="url(#ah)"/>
  <path class="edge" d="M120 176 V310" marker-end="url(#ah)"/>
  <path class="edge" d="M430 176 V310" marker-end="url(#ah)"/>

  <!-- row 1: five branches -->
  <rect class="box" x="40" y="112" width="160" height="64" rx="9"/>
  <text class="ttl" x="120" y="138" text-anchor="middle">Функциональная</text>
  <text class="ttl" x="120" y="155" text-anchor="middle">схема (ФСА)</text>
  <text class="sub" x="120" y="170" text-anchor="middle">что меряем, чем управляем</text>

  <rect class="box" x="195" y="112" width="160" height="64" rx="9"/>
  <text class="ttl" x="275" y="138" text-anchor="middle">Принципиальные</text>
  <text class="ttl" x="275" y="155" text-anchor="middle">эл. схемы</text>
  <text class="sub" x="275" y="170" text-anchor="middle">электрические связи</text>

  <rect class="box" x="350" y="112" width="160" height="64" rx="9"/>
  <text class="ttl" x="430" y="138" text-anchor="middle">Схемы соединений</text>
  <text class="ttl" x="430" y="155" text-anchor="middle">(монтажные)</text>
  <text class="sub" x="430" y="170" text-anchor="middle">провод на клемму</text>

  <rect class="box" x="505" y="112" width="160" height="64" rx="9"/>
  <text class="ttl" x="585" y="138" text-anchor="middle">Кабельный</text>
  <text class="ttl" x="585" y="155" text-anchor="middle">журнал</text>
  <text class="sub" x="585" y="170" text-anchor="middle">перечень всех кабелей</text>

  <rect class="box" x="660" y="112" width="160" height="64" rx="9"/>
  <text class="ttl" x="740" y="138" text-anchor="middle">Спецификация</text>
  <text class="ttl" x="740" y="155" text-anchor="middle">оборудования</text>
  <text class="sub" x="740" y="170" text-anchor="middle">что и сколько заказать</text>

  <rect class="box" x="40" y="310" width="160" height="64" rx="9"/>
  <text class="ttl" x="120" y="336" text-anchor="middle">Чертёж общего</text>
  <text class="ttl" x="120" y="353" text-anchor="middle">вида щита</text>
  <text class="sub" x="120" y="368" text-anchor="middle">компоновка шкафа</text>

  <rect class="box" x="350" y="310" width="160" height="64" rx="9"/>
  <text class="ttl" x="430" y="336" text-anchor="middle">Сквозные позиции</text>
  <text class="ttl" x="430" y="353" text-anchor="middle">приборов</text>
  <text class="sub" x="430" y="368" text-anchor="middle">нить через все документы</text>

  <text class="sub" x="430" y="420" text-anchor="middle">Позиция прибора на ФСА = та же позиция в спецификации, на клемме, в кабельном журнале и на бирке в цеху</text>
</svg>
