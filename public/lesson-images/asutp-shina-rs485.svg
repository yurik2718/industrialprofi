<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 400" role="img" aria-label="Шина RS-485: одна витая пара, к которой ответвлениями подключены ПЛК-мастер и устройства с адресами, на концах — терминаторы 120 Ом">
  <style>
    text{font-family:Inter,system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;fill:#ededed}
    .box{fill:#161616;stroke:#2e2e2e;stroke-width:1.5}
    .dec{fill:#11161c;stroke:#3d9bff;stroke-width:1.75}
    .edge{stroke:#7d7d7d;stroke-width:1.75;fill:none}
    .bus{stroke:#3d9bff;stroke-width:2.5;fill:none}
    .tap{stroke:#7d7d7d;stroke-width:1.5;fill:none}
    .ttl{font-size:14px;font-weight:700}
    .sub{fill:#a1a1a1;font-size:11px}
    .lbl{font-size:11px;fill:#a1a1a1}
    .addr{font-size:11px;font-weight:700;fill:#3d9bff}
  </style>
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#7d7d7d"/></marker>
  </defs>

  <!-- Master: PLC on top -->
  <rect class="dec" x="350" y="14" width="160" height="56" rx="10"/>
  <text class="ttl" x="430" y="38" text-anchor="middle">ПЛК — master</text>
  <text class="sub" x="430" y="56" text-anchor="middle">ведущий, опрашивает шину</text>

  <!-- master tap down to bus -->
  <path class="tap" d="M430 70 V150"/>
  <circle cx="430" cy="150" r="3.5" fill="#3d9bff"/>

  <!-- The twisted-pair bus line (two close horizontal lines) -->
  <path class="bus" d="M70 148 H790"/>
  <path class="bus" d="M70 154 H790"/>
  <text class="lbl" x="430" y="138" text-anchor="middle">витая пара A/B (одна линия на всех)</text>

  <!-- Terminators at both ends -->
  <!-- left -->
  <path class="edge" d="M70 148 H46 V154 H70" />
  <rect class="box" x="14" y="142" width="30" height="18" rx="4"/>
  <text class="addr" x="29" y="155" text-anchor="middle" fill="#ededed" font-size="10">120Ω</text>
  <text class="lbl" x="29" y="178" text-anchor="middle">терминатор</text>
  <!-- right -->
  <path class="edge" d="M790 148 H814 V154 H790" />
  <rect class="box" x="816" y="142" width="30" height="18" rx="4"/>
  <text class="addr" x="831" y="155" text-anchor="middle" fill="#ededed" font-size="10">120Ω</text>
  <text class="lbl" x="831" y="178" text-anchor="middle">терминатор</text>

  <!-- Slave taps -->
  <!-- slave 1 -->
  <path class="tap" d="M170 154 V222"/>
  <circle cx="170" cy="151" r="3.5" fill="#3d9bff"/>
  <rect class="box" x="110" y="222" width="120" height="60" rx="10"/>
  <text class="ttl" x="170" y="246" text-anchor="middle" font-size="12">Датчик давления</text>
  <text class="addr" x="170" y="266" text-anchor="middle">адрес 1</text>

  <!-- slave 2 -->
  <path class="tap" d="M345 154 V222"/>
  <circle cx="345" cy="151" r="3.5" fill="#3d9bff"/>
  <rect class="box" x="285" y="222" width="120" height="60" rx="10"/>
  <text class="ttl" x="345" y="246" text-anchor="middle" font-size="12">Датчик темп.</text>
  <text class="addr" x="345" y="266" text-anchor="middle">адрес 2</text>

  <!-- slave 3 -->
  <path class="tap" d="M515 154 V222"/>
  <circle cx="515" cy="151" r="3.5" fill="#3d9bff"/>
  <rect class="box" x="455" y="222" width="120" height="60" rx="10"/>
  <text class="ttl" x="515" y="246" text-anchor="middle" font-size="12">Частотник</text>
  <text class="addr" x="515" y="266" text-anchor="middle">адрес 3</text>

  <!-- slave 4 -->
  <path class="tap" d="M690 154 V222"/>
  <circle cx="690" cy="151" r="3.5" fill="#3d9bff"/>
  <rect class="box" x="630" y="222" width="120" height="60" rx="10"/>
  <text class="ttl" x="690" y="246" text-anchor="middle" font-size="12">Счётчик эл.</text>
  <text class="addr" x="690" y="266" text-anchor="middle">адрес 4</text>

  <text class="lbl" x="170" y="300" text-anchor="middle">slave</text>
  <text class="lbl" x="345" y="300" text-anchor="middle">slave</text>
  <text class="lbl" x="515" y="300" text-anchor="middle">slave</text>
  <text class="lbl" x="690" y="300" text-anchor="middle">slave</text>

  <!-- request/response legend -->
  <path class="edge" d="M560 92 H600" marker-end="url(#ah)"/>
  <text class="lbl" x="640" y="96" text-anchor="middle">запрос (master → slave)</text>
  <path class="edge" d="M600 112 H560" marker-end="url(#ah)"/>
  <text class="lbl" x="643" y="116" text-anchor="middle">ответ (только когда спросили)</text>

  <!-- caption -->
  <text class="sub" x="430" y="352" text-anchor="middle" font-size="12">Все на одной паре, дифференциальный сигнал помехоустойчив.</text>
  <text class="sub" x="430" y="372" text-anchor="middle">Топология — линия (не звезда); терминаторы 120 Ом на обоих концах; master один, slave много.</text>
</svg>
