<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 438" role="img" aria-label="График переходного процесса: уставка SP пунктиром, кривые «только П» с недобором (статическая ошибка), «ПИ» с перерегулированием и «ПИД» с плавным точным выходом на уставку">
  <style>
    text{font-family:Inter,system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;fill:#ededed}
    .axis{stroke:#7d7d7d;stroke-width:1.75;fill:none}
    .grid{stroke:#2e2e2e;stroke-width:1;fill:none}
    .sp{stroke:#a1a1a1;stroke-width:1.5;fill:none;stroke-dasharray:6 5}
    .cp{stroke:#a1a1a1;stroke-width:2.25;fill:none}
    .cpi{stroke:#ededed;stroke-width:2.25;fill:none}
    .cpid{stroke:#3d9bff;stroke-width:2.5;fill:none}
    .lbl{font-size:11px;fill:#a1a1a1}
    .ttl{font-size:13px;font-weight:700}
    .leg{font-size:12px}
    .err{stroke:#f25a4e;stroke-width:1.5;fill:none;stroke-dasharray:3 3}
  </style>
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#7d7d7d"/></marker>
  </defs>

  <!-- plot area: x 70..560, y 40..330 ; SP line at y=90 -->
  <!-- grid -->
  <path class="grid" d="M70 90 H560"/>

  <!-- axes -->
  <path class="axis" d="M70 330 H572" marker-end="url(#ah)"/>
  <path class="axis" d="M70 330 V36" marker-end="url(#ah)"/>
  <text class="lbl" x="64" y="50" text-anchor="end">PV</text>
  <text class="lbl" x="578" y="334" text-anchor="start">t</text>

  <!-- setpoint -->
  <path class="sp" d="M70 90 H560"/>
  <text class="lbl" x="566" y="86" text-anchor="start" fill="#ededed">SP (уставка)</text>

  <!-- only P : rises fast, settles below SP (static error) -->
  <path class="cp" d="M70 330 C150 130 200 130 250 132 C330 134 460 134 560 134"/>
  <!-- static error bracket between SP(90) and P-settle(134) -->
  <path class="err" d="M250 90 V132"/>
  <text class="lbl" x="258" y="116" text-anchor="start" fill="#f25a4e">статическая</text>
  <text class="lbl" x="258" y="130" text-anchor="start" fill="#f25a4e">ошибка</text>

  <!-- PI : reaches SP with small overshoot -->
  <path class="cpi" d="M70 330 C160 110 200 72 250 78 C300 84 330 90 400 90 C470 90 520 90 560 90"/>

  <!-- PID : smooth, accurate, no overshoot -->
  <path class="cpid" d="M70 330 C170 150 230 92 300 91 C380 90 470 90 560 90"/>

  <!-- legend -->
  <text class="ttl" x="70" y="360">Переходный процесс PV(t)</text>

  <line class="cp" x1="80" y1="382" x2="116" y2="382"/>
  <text class="leg" x="124" y="386" text-anchor="start">только П — выходит быстро, но застревает ниже SP</text>

  <line class="cpi" x1="80" y1="402" x2="116" y2="402"/>
  <text class="leg" x="124" y="406" text-anchor="start">ПИ — доходит до SP, небольшое перерегулирование</text>

  <line class="cpid" x1="80" y1="422" x2="116" y2="422"/>
  <text class="leg" x="124" y="426" text-anchor="start">ПИД — плавно и точно, без колебаний</text>
</svg>
