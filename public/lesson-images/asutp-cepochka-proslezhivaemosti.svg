<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 470" role="img" aria-label="Цепочка прослеживаемости: государственный первичный эталон, рабочий эталон, эталон поверочной лаборатории, рабочий датчик, измеренное значение — каждая ступень поверяет следующую">
  <style>
    text{font-family:Inter,system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;fill:#ededed}
    .box{fill:#161616;stroke:#2e2e2e;stroke-width:1.5}
    .dec{fill:#11161c;stroke:#3d9bff;stroke-width:1.75}
    .edge{stroke:#7d7d7d;stroke-width:1.75;fill:none}
    .ttl{font-size:14px;font-weight:700}
    .sub{fill:#a1a1a1;font-size:11px}
    .tag{fill:#3d9bff;font-size:11px;font-weight:600}
    .axis{stroke:#3d9bff;stroke-width:1.75;fill:none}
  </style>
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#7d7d7d"/></marker>
    <marker id="ahb" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#3d9bff"/></marker>
  </defs>

  <!-- Step 1: top, most accurate -->
  <rect class="dec" x="190" y="20" width="380" height="56" rx="10"/>
  <text class="ttl" x="380" y="44" text-anchor="middle">Государственный первичный эталон</text>
  <text class="sub" x="380" y="62" text-anchor="middle">высшая точность в стране</text>

  <rect class="box" x="190" y="108" width="380" height="56" rx="10"/>
  <text class="ttl" x="380" y="132" text-anchor="middle">Рабочий эталон</text>
  <text class="sub" x="380" y="150" text-anchor="middle">сличается с первичным эталоном</text>

  <rect class="box" x="190" y="196" width="380" height="56" rx="10"/>
  <text class="ttl" x="380" y="220" text-anchor="middle">Эталон поверочной лаборатории</text>
  <text class="sub" x="380" y="238" text-anchor="middle">аккредитованная организация</text>

  <rect class="box" x="190" y="284" width="380" height="56" rx="10"/>
  <text class="ttl" x="380" y="308" text-anchor="middle">Рабочий датчик на объекте</text>
  <text class="sub" x="380" y="326" text-anchor="middle">твой прибор КИПиА</text>

  <rect class="box" x="190" y="372" width="380" height="56" rx="10"/>
  <text class="ttl" x="380" y="396" text-anchor="middle">Измеренное значение</text>
  <text class="sub" x="380" y="414" text-anchor="middle">80 °C — которому можно верить</text>

  <!-- "поверяет" arrows: each step verifies the one below -->
  <path class="edge" d="M300 76 V108" marker-end="url(#ah)"/>
  <path class="edge" d="M300 164 V196" marker-end="url(#ah)"/>
  <path class="edge" d="M300 252 V284" marker-end="url(#ah)"/>
  <path class="edge" d="M300 340 V372" marker-end="url(#ah)"/>

  <text class="tag" x="312" y="96" text-anchor="start">поверяет</text>
  <text class="tag" x="312" y="184" text-anchor="start">поверяет</text>
  <text class="tag" x="312" y="272" text-anchor="start">поверяет</text>
  <text class="tag" x="312" y="360" text-anchor="start">даёт</text>

  <!-- side axis: accuracy grows bottom to top -->
  <path class="axis" d="M90 420 V40" marker-end="url(#ahb)"/>
  <text class="tag" x="78" y="120" text-anchor="middle" transform="rotate(-90 78 120)">точность растёт</text>

  <!-- right side: traceability label -->
  <text class="tag" x="630" y="120" text-anchor="middle" transform="rotate(90 630 120)">цепочка прослеживаемости</text>
</svg>
