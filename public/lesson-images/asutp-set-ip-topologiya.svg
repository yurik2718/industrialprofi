<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 470" role="img" aria-label="Сеть АСУ ТП: ПЛК 192.168.1.10 и АРМ SCADA 192.168.1.20 в подсети 192.168.1.0/24 подключены медной витой парой к коммутатору; через маршрутизатор-шлюз 192.168.1.1 выход к серверу MES в подсети 192.168.2.0; оптическая линия до удалённого шкафа в соседнем здании.">
  <style>
    text{font-family:Inter,system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;fill:#ededed}
    .box{fill:#161616;stroke:#2e2e2e;stroke-width:1.5}
    .dec{fill:#11161c;stroke:#3d9bff;stroke-width:1.75}
    .edge{stroke:#7d7d7d;stroke-width:1.75;fill:none}
    .opt{stroke:#3d9bff;stroke-width:2.2;fill:none}
    .ttl{font-size:14px;font-weight:700}
    .lbl{font-size:12px;font-weight:600}
    .ip{fill:#3d9bff;font-size:11px;font-weight:600}
    .sub{fill:#a1a1a1;font-size:11px}
    .net{fill:#a1a1a1;font-size:11px;font-weight:600}
  </style>
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#7d7d7d"/></marker>
  </defs>

  <!-- Subnet 1 zone -->
  <rect x="16" y="40" width="430" height="240" rx="12" fill="none" stroke="#2e2e2e" stroke-width="1.25" stroke-dasharray="5 4"/>
  <text class="net" x="32" y="62">Подсеть 192.168.1.0 / 24  (маска 255.255.255.0)</text>

  <!-- PLC -->
  <rect class="box" x="40" y="90" width="150" height="60" rx="10"/>
  <text class="ttl" x="115" y="116" text-anchor="middle">ПЛК</text>
  <text class="ip"  x="115" y="136" text-anchor="middle">192.168.1.10</text>

  <!-- SCADA -->
  <rect class="box" x="270" y="90" width="150" height="60" rx="10"/>
  <text class="ttl" x="345" y="116" text-anchor="middle">АРМ SCADA</text>
  <text class="ip"  x="345" y="136" text-anchor="middle">192.168.1.20</text>

  <!-- Switch -->
  <rect class="dec" x="155" y="210" width="150" height="56" rx="10"/>
  <text class="ttl" x="230" y="234" text-anchor="middle">Коммутатор</text>
  <text class="sub" x="230" y="252" text-anchor="middle">управляемый</text>

  <!-- copper links PLC/SCADA -> switch -->
  <path class="edge" d="M115 150 V190 H205 V210" marker-end="url(#ah)"/>
  <path class="edge" d="M345 150 V190 H255 V210" marker-end="url(#ah)"/>
  <text class="sub" x="150" y="184" text-anchor="middle">медь · витая пара</text>
  <text class="sub" x="318" y="184" text-anchor="middle">медь</text>

  <!-- Gateway / router -->
  <rect class="box" x="540" y="90" width="160" height="60" rx="10"/>
  <text class="ttl" x="620" y="116" text-anchor="middle">Маршрутизатор</text>
  <text class="ip"  x="620" y="136" text-anchor="middle">шлюз 192.168.1.1</text>

  <!-- switch -> gateway -->
  <path class="edge" d="M305 238 H620 V150" marker-end="url(#ah)"/>
  <text class="sub" x="455" y="232" text-anchor="middle">медь</text>

  <!-- MES subnet -->
  <rect class="box" x="540" y="40" width="160" height="34" rx="8"/>
  <text class="lbl" x="620" y="62" text-anchor="middle">Сервер MES</text>
  <path class="edge" d="M620 90 V74" marker-end="url(#ah)"/>
  <text class="net" x="710" y="58">подсеть</text>
  <text class="net" x="710" y="72">192.168.2.0</text>
  <text class="sub" x="744" y="116" text-anchor="middle">другая</text>
  <text class="sub" x="744" y="130" text-anchor="middle">сеть →</text>
  <path class="edge" d="M700 120 H760" marker-end="url(#ah)"/>

  <!-- Optical link to remote cabinet -->
  <path class="opt" d="M230 266 V340 H600 V340" marker-end="url(#ah)"/>
  <rect class="dec" x="600" y="310" width="200" height="62" rx="10"/>
  <text class="ttl" x="700" y="335" text-anchor="middle">Удалённый шкаф</text>
  <text class="sub" x="700" y="354" text-anchor="middle">соседнее здание</text>
  <text x="380" y="334" text-anchor="middle" class="lbl" fill="#3d9bff">оптика · дальняя трасса</text>
  <text class="sub" x="380" y="352" text-anchor="middle">не боится ЭМ-помех</text>

  <!-- Legend -->
  <line x1="40" y1="420" x2="80" y2="420" class="edge"/>
  <text class="sub" x="88" y="424">медь (витая пара) — до ~100 м, внутри цеха</text>
  <line x1="430" y1="420" x2="470" y2="420" class="opt"/>
  <text class="sub" x="478" y="424">оптика — километры, между зданиями</text>
</svg>
