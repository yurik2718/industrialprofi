<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 470" role="img" aria-label="Лестница групп допуска по электробезопасности от I до V: с каждой ступенью растут требуемый стаж, объём знаний и разрешённые работы; зоны до 1000 В и выше 1000 В.">
  <style>
    text{font-family:Inter,system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;fill:#ededed}
    .box{fill:#161616;stroke:#2e2e2e;stroke-width:1.5}
    .dec{fill:#11161c;stroke:#3d9bff;stroke-width:1.75}
    .edge{stroke:#7d7d7d;stroke-width:1.75;fill:none}
    .ttl{font-size:14px;font-weight:700}
    .grp{font-size:18px;font-weight:700}
    .sub{fill:#a1a1a1;font-size:11px}
    .zone{fill:#a1a1a1;font-size:11px;font-weight:600}
    .axis{font-size:11px;fill:#3d9bff;font-weight:600}
  </style>
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#3d9bff"/></marker>
  </defs>

  <!-- growth arrow (left axis) -->
  <path class="edge" d="M40 430 V40" stroke="#3d9bff" marker-end="url(#ah)"/>
  <text class="axis" x="34" y="240" text-anchor="middle" transform="rotate(-90 34 240)">Рост прав и ответственности</text>

  <!-- voltage zones (right) -->
  <text class="zone" x="844" y="120" text-anchor="end">выше 1000 В</text>
  <text class="zone" x="844" y="350" text-anchor="end">до 1000 В</text>
  <path class="edge" d="M812 60 V200" stroke="#2e2e2e" stroke-dasharray="4 4" marker-end="none"/>
  <path class="edge" d="M812 250 V430" stroke="#2e2e2e" stroke-dasharray="4 4" marker-end="none"/>

  <!-- Step V (top) -->
  <rect class="dec" x="70" y="40" width="730" height="70" rx="10"/>
  <text class="grp" x="92" y="72">V</text>
  <text class="ttl" x="120" y="68">Руководитель работ</text>
  <text class="sub" x="120" y="85">Установки выше 1000 В · ответственный руководитель</text>
  <text class="sub" x="120" y="100">Полное знание правил · максимальный стаж и объём знаний</text>

  <!-- Step IV -->
  <rect class="box" x="70" y="125" width="660" height="70" rx="10"/>
  <text class="grp" x="92" y="157">IV</text>
  <text class="ttl" x="120" y="153">Опытный специалист</text>
  <text class="sub" x="120" y="170">Эксплуатация до 1000 В как ответственное лицо</text>
  <text class="sub" x="120" y="185">Право выдавать наряды-допуски до 1000 В</text>

  <!-- Step III -->
  <rect class="box" x="70" y="210" width="590" height="70" rx="10"/>
  <text class="grp" x="92" y="242">III</text>
  <text class="ttl" x="120" y="238">Самостоятельный электрик до 1000 В</text>
  <text class="sub" x="120" y="255">Самостоятельное обслуживание · работа по наряду</text>
  <text class="sub" x="120" y="270">С III группы — знание ПУЭ и ПТЭЭП</text>

  <!-- Step II -->
  <rect class="box" x="70" y="295" width="520" height="70" rx="10"/>
  <text class="grp" x="92" y="327">II</text>
  <text class="ttl" x="120" y="323">Начинающий электротехнический персонал</text>
  <text class="sub" x="120" y="340">Работа в составе бригады под надзором</text>
  <text class="sub" x="120" y="355">Начальный уровень знаний</text>

  <!-- Step I (base) -->
  <rect class="box" x="70" y="380" width="450" height="60" rx="10"/>
  <text class="grp" x="92" y="412">I</text>
  <text class="ttl" x="120" y="408">Неэлектротехнический персонал</text>
  <text class="sub" x="120" y="425">Не даёт права работать в установках · присваивается инструктажем</text>

  <!-- connectors showing strict sequence -->
  <path class="edge" d="M150 380 V365" marker-end="url(#ah)"/>
  <path class="edge" d="M150 295 V280" marker-end="url(#ah)"/>
  <path class="edge" d="M150 210 V195" marker-end="url(#ah)"/>
  <path class="edge" d="M150 125 V110" marker-end="url(#ah)"/>

  <text class="sub" x="800" y="455" text-anchor="end">Группу нельзя «перепрыгнуть» — только последовательно (приказ Минтруда № 903н)</text>
</svg>
