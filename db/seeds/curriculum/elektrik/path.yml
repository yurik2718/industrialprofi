title: "Электрик"
description: "Полный путь от группы допуска II до самостоятельного специалиста (IV–V): электробезопасность, основы электротехники, устройство электроустановок, монтаж, измерения и эксплуатация. Основан на действующих ПУЭ, ПТЭЭП (приказ Минэнерго № 811), Правилах по охране труда (приказ Минтруда № 903н) и ГОСТ Р 50571."
position: 1
