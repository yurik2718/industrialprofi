title: "Электрик"
description: "Полный путь от группы допуска II до самостоятельного специалиста (IV–V): электробезопасность, основы электротехники, ПУЭ и устройство электроустановок, монтаж, измерения, эксплуатация и специализации. Основан на ПУЭ-7, ПТЭЭП (Приказ Минэнерго № 811), Правилах по охране труда (Приказ Минтруда № 903н) и ГОСТ Р 50571."
position: 1
status: published
